/* Modal — pure component but form values live in DOM (controlled by save handler) */

const Modal = () => {
  if (!state.modal) return null;
  const { mode, item } = state.modal;

  // Local form state lives here, captured in closure. The slot system ensures
  // the modal isn't re-rendered while open (key = mode+item.id).
  const form = { ...item };
  let attachEl = null;

  const updateAttach = () => {
    if (!attachEl) return;
    attachEl.replaceChildren(...buildAttachContents());
  };

  const buildAttachContents = () => {
    const out = [];
    out.push(el('div', { class: 'attach-row' },
      el('button', { class: 'attach-btn', onClick: async () => {
        try {
          const r = await Attach.pickImage(true);
          if (r) { form.attKind = r.kind; form.attDriveId = r.driveId; form.attThumb = r.thumb; updateAttach(); }
        } catch (e) { Actions.toast('Camera failed: ' + e.message); }
      }}, Icon.cam(), 'Camera'),
      el('button', { class: 'attach-btn', onClick: async () => {
        try {
          const r = await Attach.pickImage(false);
          if (r) { form.attKind = r.kind; form.attDriveId = r.driveId; form.attThumb = r.thumb; updateAttach(); }
        } catch (e) { Actions.toast('Image failed: ' + e.message); }
      }}, Icon.pic(), 'Gallery')));
    if (form.attKind === 'image' && form.attThumb) {
      out.push(el('div', { class: 'attach-preview' },
        el('div', { style: { position: 'relative', display: 'inline-block' } },
          el('img', { class: 'attach-thumb', src: form.attThumb }),
          el('div', { class: 'attach-x', style: { position: 'absolute', top: '4px', right: '4px' },
            onClick: () => { form.attKind = null; form.attDriveId = ''; form.attThumb = ''; updateAttach(); } },
            '✕'))));
    }
    return out;
  };

  const setType = t => {
    form.type = t;
    document.querySelectorAll('.type-opt').forEach(b => b.classList.toggle('on', b.dataset.t === t));
    document.querySelectorAll('.type-opt').forEach(b => {
      ['note','todo','event'].forEach(c => b.classList.remove(c));
      b.classList.add(b.dataset.t);
    });
    document.getElementById('end-time-row').style.display = t === 'event' ? 'flex' : 'none';
  };

  const save = async () => {
    const content = document.getElementById('m-content').value.trim();
    if (!content) return Actions.toast('Enter some text');
    form.content = content;
    form.date = document.getElementById('m-date').value;
    form.time = document.getElementById('m-time').value;
    form.endTime = document.getElementById('m-endtime').value;
    const remToggle = document.getElementById('rem-toggle').classList.contains('on');
    if (remToggle) {
      form.remStart = parseInt(document.getElementById('rem-start').value, 10);
      form.remEvery = parseInt(document.getElementById('rem-every').value, 10);
      form.remTimes = parseInt(document.getElementById('rem-times').value, 10);
    } else {
      form.remStart = null; form.remEvery = 0; form.remTimes = 1;
    }
    Actions.upsertItem(form);
    Actions.closeModal();
    try { await Sync.push(form); Reminders.scheduleAll(); }
    catch (e) { Actions.toast('Save failed: ' + e.message); }
  };

  const remToggle = (form.remStart != null);

  return el('div', { class: 'backdrop', onClick: e => { if (e.target.classList.contains('backdrop')) Actions.closeModal(); }},
    el('div', { class: 'sheet' },
      // Header
      el('div', { class: 'sheet-hdr' },
        el('button', { class: 'sheet-cancel', onClick: Actions.closeModal }, 'Cancel'),
        el('div', { class: 'sheet-title' }, mode === 'new' ? 'New Item' : 'Edit Item'),
        el('button', { class: 'sheet-save', onClick: save }, 'Save')),
      // Body
      el('div', { class: 'sheet-body' },
        // Type selector
        el('div', { class: 'type-select' },
          ['note','todo','event'].map(t =>
            el('button', { class: 'type-opt ' + t + (form.type === t ? ' on' : ''),
              dataset: { t }, onClick: () => setType(t) },
              el('span', { class: 'type-opt-ic' }, t === 'note' ? '📝' : t === 'todo' ? '○' : '📅'),
              t.charAt(0).toUpperCase() + t.slice(1)))),
        // Content textarea
        el('textarea', { id: 'm-content', class: 'input',
          placeholder: 'What\'s on your mind?',
          rows: 4,
          ref: ta => { ta.value = form.content; setTimeout(() => ta.focus(), 50); attachAutoBullet(ta); }}),
        // Date/time fields
        el('div', { class: 'field-group' },
          el('div', { class: 'field-row' },
            el('span', { class: 'field-label' }, 'Date'),
            el('input', { id: 'm-date', type: 'date', value: form.date })),
          el('div', { class: 'field-row' },
            el('span', { class: 'field-label' }, 'Time'),
            el('input', { id: 'm-time', type: 'time', value: form.time })),
          el('div', { class: 'field-row', id: 'end-time-row',
            style: { display: form.type === 'event' ? 'flex' : 'none' } },
            el('span', { class: 'field-label' }, 'Ends'),
            el('input', { id: 'm-endtime', type: 'time', value: form.endTime }))),
        // Reminder
        el('div', { class: 'field-group' },
          el('div', { class: 'field-row' },
            el('span', { class: 'field-label' }, '⏰  Reminder'),
            el('div', { id: 'rem-toggle', class: 'toggle' + (remToggle ? ' on' : ''),
              onClick: e => {
                e.currentTarget.classList.toggle('on');
                document.getElementById('rem-fields').style.display =
                  e.currentTarget.classList.contains('on') ? 'block' : 'none';
                if (e.currentTarget.classList.contains('on')) Reminders.requestPerm();
              }})),
          el('div', { id: 'rem-fields', style: { display: remToggle ? 'block' : 'none' } },
            el('div', { class: 'field-row' },
              el('span', { class: 'field-label' }, 'Notify'),
              el('select', { id: 'rem-start', class: 'input', style: { width: 'auto', padding: '4px 8px' } },
                [5, 10, 15, 30, 60, 120, 1440].map(min =>
                  el('option', { value: String(min), selected: form.remStart === min }, min < 60 ? `${min} min before` : min < 1440 ? `${min/60} hr before` : '1 day before')))),
            el('div', { class: 'field-row' },
              el('span', { class: 'field-label' }, 'Repeat'),
              el('select', { id: 'rem-every', class: 'input', style: { width: 'auto', padding: '4px 8px' } },
                [0, 5, 10, 15, 30].map(min =>
                  el('option', { value: String(min), selected: form.remEvery === min }, min === 0 ? 'Once' : `every ${min} min`))),
              el('select', { id: 'rem-times', class: 'input', style: { width: 'auto', padding: '4px 8px', marginLeft: '8px' } },
                [1, 2, 3, 5].map(n =>
                  el('option', { value: String(n), selected: form.remTimes === n }, `${n}×`))))),
        ),
        // Attachments
        el('div', { class: 'field-group', ref: r => { attachEl = r; } }, ...buildAttachContents()),
        // Delete (edit only)
        mode === 'edit' && el('button', { class: 'delete-btn', onClick: async () => {
          if (!confirm('Delete this item?')) return;
          Actions.deleteItem(form.id); Actions.closeModal();
          try { await Sync.remove(form); } catch (e) { Actions.toast('Delete failed'); }
        }}, 'Delete'))));
};

/* ContextMenu — adaptive per item */

const ContextMenu = () => {
  if (!state.ctx) return null;
  const { x, y, item } = state.ctx;
  const items = menuFor(item);

  // Position: clamp to viewport
  const w = 240, h = items.length * 44;
  const left = Math.min(x, window.innerWidth - w - 12);
  const top  = Math.min(y, window.innerHeight - h - 12);

  return el('div', {},
    el('div', { class: 'ctx-backdrop', onClick: Actions.closeCtx }),
    el('div', { class: 'ctx-menu', style: { left: left + 'px', top: top + 'px' } },
      items.map((mi, i) => el('div', {
        class: 'ctx-item' + (mi.danger ? ' danger' : ''),
        onClick: () => { Actions.closeCtx(); mi.fn(); }},
        mi.label, mi.icon && el('span', { class: 'ctx-item-icon' }, mi.icon)))));
};

const menuFor = item => {
  const out = [
    { label: 'Edit', icon: '✏️', fn: () => Actions.openEdit(item.id) },
  ];
  if (item.type === 'todo') {
    out.push({ label: item.completed ? 'Mark incomplete' : 'Mark complete',
               icon: item.completed ? '○' : '✓',
               fn: () => toggleDone(item) });
  }
  if (item.time && !item.completed) {
    out.push({ label: item.remStart != null ? 'Edit reminder' : 'Add reminder',
               icon: '⏰', fn: () => Actions.openEdit(item.id) });
  }
  if (item.attKind === 'image') {
    out.push({ label: 'View image', icon: '🖼', fn: () => Attach.showImage(item.attDriveId) });
  }
  // Type conversions
  ['note','todo','event'].filter(t => t !== item.type).forEach(t => {
    out.push({ label: `Convert to ${t}`, icon: t === 'note' ? '📝' : t === 'todo' ? '○' : '📅',
               fn: async () => {
                 const updated = { ...item, type: t };
                 if (t !== 'todo') updated.completed = false;
                 Actions.upsertItem(updated);
                 try { await Sync.push(updated); } catch (e) { Actions.toast('Failed'); }
               }});
  });
  out.push({ label: 'Delete', danger: true, icon: '🗑', fn: async () => {
    if (!confirm('Delete this item?')) return;
    Actions.deleteItem(item.id);
    try { await Sync.remove(item); } catch (e) { Actions.toast('Delete failed'); }
  }});
  return out;
};

/* CommandPalette */

const CommandPalette = () => {
  if (!state.cmd?.open) return null;

  let inputEl;
  const renderResults = (q) => {
    const resultsEl = document.getElementById('cmd-results');
    if (!resultsEl) return;
    const results = computeCmdResults(q);
    resultsEl.replaceChildren(...buildCmdRows(results));
  };

  return el('div', { class: 'cmd-backdrop', onClick: e => { if (e.target.classList.contains('cmd-backdrop')) Actions.closeCmd(); }},
    el('div', { class: 'cmd-palette' },
      el('div', { class: 'cmd-input' },
        Icon.search(),
        el('input', { type: 'text', placeholder: 'Add "lunch w/ raghu tue 1pm", jump to date, search…',
          autocomplete: 'off',
          ref: i => { inputEl = i; setTimeout(() => i.focus(), 60); },
          onInput: e => renderResults(e.target.value),
          onKeydown: e => {
            if (e.key === 'Escape') Actions.closeCmd();
            if (e.key === 'Enter') {
              const focused = document.querySelector('.cmd-row.focused');
              if (focused) focused.click();
            }
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
              e.preventDefault();
              const rows = [...document.querySelectorAll('.cmd-row')];
              const cur  = document.querySelector('.cmd-row.focused');
              const idx  = cur ? rows.indexOf(cur) : -1;
              const next = e.key === 'ArrowDown' ? rows[idx+1] || rows[0] : rows[idx-1] || rows[rows.length-1];
              if (cur)  cur.classList.remove('focused');
              if (next) { next.classList.add('focused'); next.scrollIntoView({ block: 'nearest' }); }
            }
          },
        })),
      el('div', { class: 'cmd-results', id: 'cmd-results' },
        ...buildCmdRows(computeCmdResults('')))));
};

const computeCmdResults = q => {
  const query = q.trim().toLowerCase();
  const raw   = q.trim();
  const out = { quick: null, actions: [], date: null, items: [] };

  if (raw) out.quick = QuickParse.parse(raw);

  const allActions = [
    { ic: '+', label: 'New item',     sub: 'Create note, todo or event', fn: () => { Actions.closeCmd(); Actions.openNew(); }},
    { ic: '◎', label: 'Today',        sub: ds(today()),                  fn: () => { Actions.closeCmd(); Actions.goToday(); }},
    { ic: 'M', label: 'Month view',   sub: 'Calendar grid',              fn: () => { Actions.closeCmd(); Actions.navigate({ name: 'month', date: state.view.date, dayMode: 'day' }); }},
    { ic: 'D', label: 'Day view',     sub: 'Hourly timeline',            fn: () => { Actions.closeCmd(); Actions.navigate({ name: 'day', date: state.view.date, dayMode: 'day' }); }},
    { ic: 'L', label: 'List view',    sub: 'All items',                  fn: () => { Actions.closeCmd(); Actions.navigate({ name: 'list', date: state.view.date, dayMode: 'day' }); }},
    { ic: '⚙', label: 'Settings',    sub: 'Profile, dark mode, sign out',fn: () => { Actions.closeCmd(); Actions.openSettings(); }},
  ];
  out.actions = query
    ? allActions.filter(a => a.label.toLowerCase().includes(query) || a.sub.toLowerCase().includes(query))
    : allActions;

  if (query) {
    const d = DateParser.parse(query);
    if (d) out.date = { d, label: DateParser.describe(d) };

    out.items = [...state.items.values()]
      .filter(i => i.content.toLowerCase().includes(query) || (i.date && i.date.includes(query)))
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
      .slice(0, 8);
  }
  return out;
};

const buildCmdRows = results => {
  const rows = [];
  let focusedAssigned = false;
  const focusCls = () => { const f = !focusedAssigned ? ' focused' : ''; focusedAssigned = true; return f; };

  if (results.quick) {
    const q = results.quick;
    const ic = q.type === 'note' ? '📝' : q.type === 'todo' ? '○' : '📅';
    const sub = [
      DateParser.describe(q.date),
      q.time ? fmtTimeShort(q.time) + (q.endTime ? '–' + fmtTimeShort(q.endTime) : '') : null,
    ].filter(Boolean).join(' · ');
    rows.push(el('div', { class: 'cmd-section' }, 'Add'));
    rows.push(el('div', { class: 'cmd-row' + focusCls(), onClick: () => createFromQuick(q) },
      el('div', { class: 'cmd-row-ic ' + q.type }, ic),
      el('div', { class: 'cmd-row-body' },
        el('div', { class: 'cmd-row-title' },
          q.title || `New ${q.type}`,
          el('span', { class: 'cmd-row-tag ' + q.type }, q.type)),
        el('div', { class: 'cmd-row-sub' }, sub))));
  }
  if (results.date) {
    rows.push(el('div', { class: 'cmd-section' }, 'Jump to date'));
    rows.push(el('div', { class: 'cmd-row' + focusCls(), onClick: () => {
      Actions.closeCmd();
      Actions.navigate({ name: 'day', date: results.date.d, dayMode: 'day' });
    }},
      el('div', { class: 'cmd-row-ic date' }, '📅'),
      el('div', { class: 'cmd-row-body' },
        el('div', { class: 'cmd-row-title' }, results.date.label),
        el('div', { class: 'cmd-row-sub' }, ds(results.date.d)))));
  }
  if (results.actions.length) {
    rows.push(el('div', { class: 'cmd-section' }, 'Actions'));
    results.actions.forEach(a => rows.push(el('div', {
      class: 'cmd-row' + focusCls(),
      onClick: a.fn,
    },
      el('div', { class: 'cmd-row-ic' }, a.ic),
      el('div', { class: 'cmd-row-body' },
        el('div', { class: 'cmd-row-title' }, a.label),
        el('div', { class: 'cmd-row-sub' }, a.sub)))));
  }
  if (results.items.length) {
    rows.push(el('div', { class: 'cmd-section' }, 'Items'));
    results.items.forEach(it => rows.push(el('div', {
      class: 'cmd-row',
      onClick: () => {
        Actions.closeCmd();
        if (it.date) {
          Actions.navigate({ name: 'day', date: parseDs(it.date), dayMode: 'day' });
        }
        Actions.openEdit(it.id);
      },
    },
      el('div', { class: 'cmd-row-ic ' + it.type }, it.type[0].toUpperCase()),
      el('div', { class: 'cmd-row-body' },
        el('div', { class: 'cmd-row-title' }, it.content || '(empty)'),
        el('div', { class: 'cmd-row-sub' },
          (it.date ? dateLabel(parseDs(it.date)) : 'No date'),
          (it.time ? ' · ' + fmtTimeShort(it.time) : ''))))));
  }
  if (rows.length === 0) {
    rows.push(el('div', { class: 'cmd-empty' }, 'No matches'));
  }
  return rows;
};

const createFromQuick = q => {
  const item = blankItem(q.date);
  item.type    = q.type;
  item.content = q.title;
  item.time    = q.time;
  item.endTime = q.endTime;
  Actions.upsertItem(item);
  Actions.closeCmd();
  Actions.toast(`Added ${q.type}${q.title ? ': ' + q.title : ''}`);
  Sync.push(item).catch(() => Actions.toast('Save failed — will retry on reload'));
};


/* Settings */

const Settings = () => {
  if (!state.settings?.open) return null;
  const u = state.user;

  return el('div', { class: 'backdrop',
    onClick: e => { if (e.target.classList.contains('backdrop')) Actions.closeSettings(); }},
    el('div', { class: 'settings-panel' },
      el('div', { class: 'settings-hdr' },
        el('div', { class: 'sheet-title' }, 'Settings'),
        el('button', { class: 'sheet-save', onClick: Actions.closeSettings }, 'Done')),
      el('div', { class: 'settings-body' },
        // Profile
        el('div', { class: 'settings-profile' },
          el('div', { class: 'settings-avatar' },
            u?.picture ? el('img', { src: u.picture }) : (u?.name?.[0] || '?')),
          el('div', { style: { flex: 1 } },
            el('div', { class: 'settings-name' }, u?.name || 'Signed in'),
            el('div', { class: 'settings-email' }, u?.email || ''))),
        // Sheet link
        el('div', { class: 'settings-list' },
          el('a', { class: 'settings-item',
            href: state.sheetId ? `https://docs.google.com/spreadsheets/d/${state.sheetId}` : '#',
            target: '_blank', rel: 'noopener' },
            '📊 ', el('span', { style: { flex: 1 } }, 'Open Google Sheet'),
            el('span', { class: 'settings-item-arrow' }, '↗')),
          el('div', { class: 'settings-item',
            onClick: () => Actions.setDark(!state.dark) },
            '🌙 ', el('span', { style: { flex: 1 } }, 'Dark Mode'),
            el('div', { class: 'toggle' + (state.dark ? ' on' : '') }))),
        // Sign out
        el('div', { class: 'settings-list' },
          el('div', { class: 'settings-item danger', onClick: () => {
            if (confirm('Sign out?')) Auth.signOut();
          }}, 'Sign Out')))));
};


/* ─── Auto-bullet ─── */

const attachAutoBullet = ta => {
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      const pos = ta.selectionStart;
      const before = ta.value.slice(0, pos);
      const after  = ta.value.slice(pos);
      const lines  = before.split('\n');
      const cur    = lines[lines.length - 1];
      const m = cur.match(/^(\s*)([-*+]|\d+\.)\s(.*)$/);
      if (!m) return;
      e.preventDefault();
      const [, indent, marker, content] = m;
      if (!content.trim()) {
        ta.value = before.slice(0, before.length - cur.length) + after;
        ta.selectionStart = ta.selectionEnd = before.length - cur.length;
      } else {
        const next = /^\d+/.test(marker) ? (parseInt(marker) + 1) + '.' : marker;
        const ins = '\n' + indent + next + ' ';
        ta.value = before + ins + after;
        ta.selectionStart = ta.selectionEnd = pos + ins.length;
      }
    }
  });
};


/* ─── Helpers for components ─── */

const itemsOnDate = date => {
  const key = ds(date);
  const out = [];
  for (const it of state.items.values()) if (it.date === key) out.push(it);
  return out;
};

const sortByTime = items => {
  const order = { event: 0, todo: 1, note: 2 };
  return [...items].sort((a, b) => {
    if (a.time && b.time) return a.time.localeCompare(b.time);
    if (a.time) return -1;
    if (b.time) return 1;
    return (order[a.type] ?? 3) - (order[b.type] ?? 3);
  });
};

const groupByDate = items => {
  const out = {};
  for (const it of items) {
    const k = it.date || '';
    (out[k] = out[k] || []).push(it);
  }
  for (const k in out) out[k] = sortByTime(out[k]);
  return out;
};

const uniq = arr => [...new Set(arr)];

const monthCells = date => {
  const first = startOfMonth(date);
  const start = addDays(first, -first.getDay());
  return Array.from({ length: 42 }, (_, i) => {
    const d = addDays(start, i);
    return { date: d, month: d.getMonth() };
  });
};

const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());

const dateLabel = d => {
  if (sameDay(d, today())) return 'Today';
  if (sameDay(d, addDays(today(), 1)))  return 'Tomorrow';
  if (sameDay(d, addDays(today(), -1))) return 'Yesterday';
  return `${DOW[d.getDay()]}, ${MON[d.getMonth()]} ${d.getDate()}`;
};

const toggleDone = async item => {
  if (item.type !== 'todo') return;
  const updated = { ...item, completed: !item.completed };
  Actions.upsertItem(updated);
  try { await Sync.push(updated); }
  catch (e) { Actions.toast('Could not save'); Actions.upsertItem(item); }
};


/* ─── 14. BOOT ──────────────────────────────────────────────────────────── */

// Global keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); Actions.openCmd(); return; }
  if (e.key === 'Escape') {
    if (state.cmd?.open)         { Actions.closeCmd(); return; }
    if (state.settings?.open)    { Actions.closeSettings(); return; }
    if (state.modal)             { Actions.closeModal(); return; }
    if (state.ctx)               { Actions.closeCtx(); return; }
  }
  // Don't intercept typing
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); Actions.openNew(); }
  if (e.key === '/')                  { e.preventDefault(); Actions.openCmd(); }
});

(function init() {
  document.documentElement.classList.toggle('dark', state.dark);
  document.documentElement.classList.toggle('light', !state.dark);

  Sync.restoreCache();
  render();

  if (state.sheetId) {
    Auth.whenGIS(async () => {
      const ok = await Auth.silentRefresh();
      if (ok) {
        if (state.items.size > 0) Actions.setStatus('ready');
        try { await Sync.load(); Auth.fetchUser(); Actions.setStatus('ready'); Reminders.scheduleAll(); }
        catch (e) { Actions.toast('Sync failed: ' + e.message); }
      } else {
        Actions.setStatus('auth');
      }
    });
  } else {
    Auth.whenGIS(() => Actions.setStatus('auth'));
  }
})();

</script>
