<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LifeOS">
<title>LifeOS</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
/* ─────────────────────────────────────────────────────────────────────────────
   DESIGN TOKENS — Apple system palette, light + dark
   ───────────────────────────────────────────────────────────────────────────── */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-1: #FFFFFF;
  --bg-2: #F2F2F7;
  --bg-3: #E5E5EA;
  --bg-4: #D1D1D6;
  --t-1: #000000;
  --t-2: rgba(60,60,67,.60);
  --t-3: rgba(60,60,67,.30);
  --t-4: rgba(60,60,67,.18);
  --sep:    rgba(60,60,67,.29);
  --sep-th: rgba(60,60,67,.12);
  --blue:   #007AFF;
  --green:  #34C759;
  --indigo: #5856D6;
  --orange: #FF9500;
  --pink:   #FF2D55;
  --purple: #AF52DE;
  --red:    #FF3B30;
  --teal:   #5AC8FA;
  --yellow: #FFCC00;
  --gray:   #8E8E93;
  --c-note:  var(--orange);
  --c-todo:  var(--blue);
  --c-event: var(--purple);
  --c-done:  var(--green);
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-7: 32px; --s-8: 40px;
  --r-1: 6px; --r-2: 10px; --r-3: 14px; --r-4: 20px;
  --topbar-h: 44px;
  --tabbar-h: 50px;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
}

html.dark {
  --bg-1: #000000;
  --bg-2: #1C1C1E;
  --bg-3: #2C2C2E;
  --bg-4: #3A3A3C;
  --t-1: #FFFFFF;
  --t-2: rgba(235,235,245,.60);
  --t-3: rgba(235,235,245,.30);
  --t-4: rgba(235,235,245,.18);
  --sep:    rgba(84,84,88,.65);
  --sep-th: rgba(84,84,88,.30);
  --blue:   #0A84FF;
  --green:  #30D158;
  --indigo: #5E5CE6;
  --orange: #FF9F0A;
  --pink:   #FF375F;
  --purple: #BF5AF2;
  --red:    #FF453A;
  --teal:   #64D2FF;
  --yellow: #FFD60A;
  --gray:   #8E8E93;
}

html { color-scheme: dark; }
html.light { color-scheme: light; }

/* ─────────────────────────────────────────────────────────────────────────────
   BASE
   ───────────────────────────────────────────────────────────────────────────── */

html, body { height: 100%; height: 100dvh; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  font-size: 17px; line-height: 1.35;
  color: var(--t-1); background: var(--bg-1);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  font-variant-numeric: tabular-nums;
}

button, input, textarea, select {
  font: inherit; color: inherit; background: none; border: none; outline: none;
  -webkit-appearance: none; appearance: none;
}
button { cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
a { color: var(--blue); text-decoration: none; }
::selection { background: rgba(10,132,255,.25); }
::-webkit-scrollbar { width: 0; height: 0; }

.t-large    { font-size: 34px; line-height: 1.15; font-weight: 700; letter-spacing: -.4px; }
.t-title    { font-size: 22px; line-height: 1.25; font-weight: 700; letter-spacing: -.2px; }
.t-headline { font-size: 17px; line-height: 1.3;  font-weight: 600; }
.t-body     { font-size: 17px; line-height: 1.4;  font-weight: 400; }
.t-callout  { font-size: 16px; line-height: 1.3;  font-weight: 400; }
.t-subhead  { font-size: 15px; line-height: 1.3;  font-weight: 400; }
.t-foot     { font-size: 13px; line-height: 1.4;  font-weight: 400; color: var(--t-2); }
.t-caption  { font-size: 12px; line-height: 1.3;  font-weight: 500; color: var(--t-2); letter-spacing: .1px; }
.t-mono     { font-family: 'SF Mono','Menlo','Cascadia Code',monospace; }

/* ─────────────────────────────────────────────────────────────────────────────
   ROOT LAYOUT
   ───────────────────────────────────────────────────────────────────────────── */

#root {
  display: flex; flex-direction: column;
  height: 100dvh; width: 100%;
  background: var(--bg-1);
  position: relative; overflow: hidden;
}

/* ─────────────────────────────────────────────────────────────────────────────
   TOP BAR
   ───────────────────────────────────────────────────────────────────────────── */

.topbar {
  flex-shrink: 0;
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  height: calc(var(--topbar-h) + var(--safe-t));
  padding: var(--safe-t) max(var(--s-4), var(--safe-r)) 0 max(var(--s-4), var(--safe-l));
  background: rgba(255,255,255,.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--sep);
  position: sticky; top: 0; z-index: 10;
}
html.dark .topbar { background: rgba(0,0,0,.75); }

.topbar-left, .topbar-right { display: flex; align-items: center; gap: var(--s-3); }
.topbar-left { justify-self: start; }
.topbar-right { justify-self: end; }
.topbar-title {
  font-size: 17px; font-weight: 600; color: var(--t-1);
  cursor: pointer; user-select: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-align: center; padding: var(--s-1) var(--s-2);
}

.btn-back { display: inline-flex; align-items: center; gap: 2px; color: var(--blue); font-size: 17px; padding: var(--s-2) 0; }
.btn-back svg { width: 18px; height: 18px; }
.btn-text { color: var(--blue); font-size: 17px; padding: var(--s-2); }
.btn-text-strong { color: var(--blue); font-size: 17px; font-weight: 600; padding: var(--s-2); }
.btn-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--blue); transition: background .12s;
}
.btn-icon:active { background: var(--bg-3); }
.btn-icon svg { width: 22px; height: 22px; }

/* Content & tabs */

.content { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; position: relative; }

.tabbar {
  flex-shrink: 0; display: flex;
  height: calc(var(--tabbar-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: rgba(255,255,255,.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--sep);
  z-index: 10;
}
html.dark .tabbar { background: rgba(0,0,0,.75); }

.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; color: var(--t-2);
  font-size: 10px; font-weight: 500; letter-spacing: .1px;
  transition: color .1s;
}
.tab.on { color: var(--blue); }
.tab svg { width: 24px; height: 24px; }

/* Auth + splash */

.auth {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: var(--s-6) var(--s-5); gap: var(--s-5); background: var(--bg-1);
}
.auth-logo {
  width: 80px; height: 80px; border-radius: 18px;
  background: linear-gradient(135deg, var(--blue), var(--indigo));
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 40px;
  box-shadow: 0 10px 40px rgba(0,122,255,.25);
}
.auth-name { font-size: 32px; font-weight: 700; letter-spacing: -.4px; }
.auth-sub { color: var(--t-2); text-align: center; font-size: 16px; max-width: 280px; }
.auth-btn {
  display: inline-flex; align-items: center; gap: var(--s-3);
  padding: 12px 22px; background: var(--t-1); color: var(--bg-1);
  border-radius: 12px; font-size: 16px; font-weight: 600; transition: opacity .12s;
}
.auth-btn:active { opacity: .7; }

.splash {
  position: fixed; inset: 0; z-index: 1000; background: var(--bg-1);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--s-4);
}
.splash-spin {
  width: 24px; height: 24px;
  border: 2.5px solid var(--bg-3); border-top-color: var(--blue);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.splash-msg { color: var(--t-2); font-size: 14px; }

/* Inputs */

.input {
  width: 100%; background: var(--bg-2); border-radius: var(--r-2);
  padding: 11px 14px; font-size: 17px; color: var(--t-1);
  border: 1px solid transparent; transition: border-color .15s;
}
.input:focus { border-color: var(--blue); }
.input::placeholder { color: var(--t-3); }
textarea.input { resize: none; min-height: 88px; line-height: 1.45; }

/* Toast */

.toast {
  position: fixed; bottom: calc(var(--tabbar-h) + var(--safe-b) + var(--s-4));
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg-3); color: var(--t-1);
  padding: 10px 16px; border-radius: 100px;
  font-size: 14px; font-weight: 500;
  box-shadow: 0 6px 24px rgba(0,0,0,.3); border: 0.5px solid var(--sep-th);
  pointer-events: none; opacity: 0;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  z-index: 9999; white-space: nowrap; max-width: 90vw;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─────────────────────────────────────────────────────────────────────────────
   MONTH VIEW
   ───────────────────────────────────────────────────────────────────────────── */

.month { display: flex; flex-direction: column; height: 100%; background: var(--bg-1); }

.month-dow {
  display: grid; grid-template-columns: repeat(7,1fr);
  padding: 0 var(--s-2); border-bottom: 0.5px solid var(--sep-th); flex-shrink: 0;
}
.month-dow > div {
  text-align: center; padding: 6px 0;
  font-size: 11px; font-weight: 600; color: var(--t-2);
  letter-spacing: .5px; text-transform: uppercase;
}
.month-dow > div.weekend { color: var(--t-3); }

.month-grid {
  display: grid; grid-template-columns: repeat(7,1fr); grid-auto-rows: 1fr;
  flex-shrink: 0; border-bottom: 0.5px solid var(--sep);
}

.day-cell {
  position: relative; padding: var(--s-1) var(--s-1) 0;
  display: flex; flex-direction: column; align-items: center;
  min-height: 56px; border-top: 0.5px solid var(--sep-th);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.day-cell.other-month .day-num { color: var(--t-3); }
.day-num {
  font-size: 17px; font-weight: 400; color: var(--t-1);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin-top: 2px;
}
.day-cell.today .day-num { background: var(--red); color: white; font-weight: 600; }
.day-cell.selected .day-num { background: var(--t-1); color: var(--bg-1); font-weight: 600; }
.day-cell.today.selected .day-num { background: var(--red); }

.day-marks { display: flex; gap: 2px; margin-top: 3px; min-height: 4px; }
.day-mark { width: 4px; height: 4px; border-radius: 50%; }
.day-mark.note  { background: var(--c-note); }
.day-mark.todo  { background: var(--c-todo); }
.day-mark.event { background: var(--c-event); }
.day-mark.done  { background: var(--c-done); opacity: .5; }

.day-list {
  flex: 1; min-height: 0;
  overflow-y: scroll; -webkit-overflow-scrolling: touch;
  padding: 0 0 var(--s-6);
  touch-action: pan-y;
}
.day-list-header {
  padding: var(--s-4) var(--s-4) var(--s-2);
  font-size: 14px; font-weight: 500; color: var(--t-2);
}
.day-list-header strong { color: var(--t-1); font-weight: 700; font-size: 17px; display: block; margin-bottom: 2px; letter-spacing: -.2px; }

.empty-state { padding: var(--s-7) var(--s-5); text-align: center; color: var(--t-3); font-size: 15px; }

/* Item row */

.item-row {
  display: flex; align-items: flex-start; gap: var(--s-3);
  padding: 11px var(--s-4); cursor: default;
  position: relative; transition: background .08s;
  -webkit-tap-highlight-color: transparent;
}
.item-row + .item-row::before {
  content: ''; position: absolute; left: 56px; right: 0; top: 0;
  border-top: 0.5px solid var(--sep-th);
}
.item-row:active { background: var(--bg-2); }
.item-row.done .item-content { color: var(--t-3); text-decoration: line-through; }

.item-bar { width: 4px; flex-shrink: 0; align-self: stretch; min-height: 22px; border-radius: 2px; margin-top: 2px; }
.item-bar.note  { background: var(--c-note); }
.item-bar.todo  { background: var(--c-todo); }
.item-bar.event { background: var(--c-event); }

.item-time {
  flex-shrink: 0; min-width: 56px;
  font-size: 13px; color: var(--t-2);
  margin-top: 2px; font-variant-numeric: tabular-nums;
}
.item-time.allday { color: var(--t-3); }

.item-body { flex: 1; min-width: 0; }
.item-content { font-size: 16px; line-height: 1.3; color: var(--t-1); word-break: break-word; }

.item-checkbox {
  width: 22px; height: 22px; flex-shrink: 0;
  border-radius: 50%; border: 1.5px solid var(--t-3);
  display: inline-flex; align-items: center; justify-content: center;
  margin-top: 1px; transition: all .15s;
}
.item-checkbox.on { background: var(--green); border-color: var(--green); color: white; }
.item-checkbox.on::after { content: '✓'; font-size: 13px; font-weight: 700; }

.item-attachments { display: flex; gap: var(--s-2); margin-top: var(--s-2); flex-wrap: wrap; }
.item-thumb { width: 64px; height: 64px; border-radius: var(--r-1); object-fit: cover; cursor: pointer; }
.item-rem-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 100px;
  background: rgba(120,120,128,.16); font-size: 12px; color: var(--t-2);
  margin-top: var(--s-1);
}

/* Markdown content */
.md-h1, .md-h2, .md-h3 { display: block; font-weight: 700; }
.md-h1 { font-size: 1.1em; }
.md-h2 { font-size: 1em; }
.md-h3 { font-size: .95em; font-weight: 600; }
.md-li { display: block; padding-left: 1em; text-indent: -1em; }
.md-q  { display: block; border-left: 3px solid var(--t-3); padding-left: 8px; color: var(--t-2); margin: 2px 0; }
.md-br { display: block; height: .5em; }
.md-code { font-family: 'SF Mono','Menlo','Cascadia Code',monospace; background: var(--bg-3); padding: 1px 5px; border-radius: 4px; font-size: .88em; }
.md-link { color: var(--blue); }

/* ─────────────────────────────────────────────────────────────────────────────
   DAY VIEW (timeline + segmented control)
   ───────────────────────────────────────────────────────────────────────────── */

.day-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-1); }

.seg-bar {
  flex-shrink: 0;
  padding: var(--s-2) var(--s-4);
  background: var(--bg-1);
  border-bottom: 0.5px solid var(--sep-th);
}
.seg-ctl {
  display: flex; gap: 2px;
  background: var(--bg-3); padding: 2px;
  border-radius: var(--r-1);
}
.seg {
  flex: 1; padding: 6px 10px;
  font-size: 13px; font-weight: 500;
  color: var(--t-1); border-radius: 5px;
  background: transparent; transition: all .15s;
}
.seg.on {
  background: var(--bg-1); font-weight: 600;
  box-shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 1px rgba(0,0,0,.06);
}
html.dark .seg.on { background: var(--bg-4); }

.timeline {
  flex: 1; min-height: 0;
  overflow-y: scroll; -webkit-overflow-scrolling: touch;
  position: relative;
  touch-action: pan-y;
}
.timeline-inner { position: relative; height: calc(24 * 60px); }

.hour-row {
  position: absolute; left: 0; right: 0; height: 60px;
  display: flex; align-items: flex-start;
  cursor: pointer;
}
.hour-row:hover { background: rgba(120,120,128,.05); }
.hour-lbl {
  width: 56px; flex-shrink: 0; padding-right: var(--s-3);
  text-align: right;
  font-size: 11px; color: var(--t-3);
  margin-top: -7px; user-select: none;
}
.hour-line { flex: 1; height: 1px; background: var(--sep-th); margin-top: 0; align-self: flex-start; }

.timeline-events {
  position: absolute; top: 0; left: 56px; right: 8px; bottom: 0;
  pointer-events: none;
}
.tl-event {
  position: absolute; pointer-events: all;
  border-radius: var(--r-1);
  padding: 4px 8px;
  font-size: 12px; line-height: 1.3;
  border-left: 3px solid;
  overflow: hidden; cursor: grab;
  background: var(--bg-2);
  touch-action: none;
  transition: box-shadow .12s ease;
}
.tl-event.dragging {
  cursor: grabbing; opacity: .92; z-index: 10;
  box-shadow: 0 6px 18px rgba(0,0,0,.22);
}
.tl-event-resize {
  position: absolute; left: 0; right: 0; bottom: 0; height: 10px;
  cursor: ns-resize; touch-action: none; pointer-events: all;
}
.tl-event-resize::after {
  content: ''; position: absolute; left: 50%; bottom: 2px;
  width: 28px; height: 3px; transform: translateX(-50%);
  border-radius: 2px; background: currentColor; opacity: .35;
}
.tl-event.note  { border-left-color: var(--c-note);  background: rgba(255,149,0,.12); color: var(--c-note); }
.tl-event.todo  { border-left-color: var(--c-todo);  background: rgba(0,122,255,.12); color: var(--c-todo); }
.tl-event.event { border-left-color: var(--c-event); background: rgba(175,82,222,.12); color: var(--c-event); }
html.dark .tl-event.note  { background: rgba(255,159,10,.18); }
html.dark .tl-event.todo  { background: rgba(10,132,255,.18); }
html.dark .tl-event.event { background: rgba(191,90,242,.18); }
.tl-event.done { opacity: .35; }
.tl-event-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-event-time { font-size: 10px; opacity: .7; margin-top: 2px; }

.now-line {
  position: absolute; left: 50px; right: 0; height: 2px;
  background: var(--red); pointer-events: none; z-index: 5;
}
.now-dot {
  position: absolute; left: -5px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--red);
}

/* All-day strip on timeline */
.tl-allday {
  border-bottom: 0.5px solid var(--sep);
  padding: var(--s-2) var(--s-4) var(--s-2) 60px;
  display: flex; flex-wrap: wrap; gap: var(--s-1);
  flex-shrink: 0; min-height: 36px;
  background: var(--bg-1);
}
.tl-allday-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 100px;
  font-size: 12px; cursor: pointer;
  background: var(--bg-2);
}
.tl-allday-pill.note  { color: var(--c-note); }
.tl-allday-pill.todo  { color: var(--c-todo); }
.tl-allday-pill.event { color: var(--c-event); }
.tl-allday-pill::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
}

/* Multi-day timeline (week-style) */
.multi { display: flex; flex-direction: column; flex: 1; min-height: 0; }
.multi-hdr {
  display: grid; grid-template-columns: 56px repeat(7, 1fr);
  border-bottom: 0.5px solid var(--sep); flex-shrink: 0;
  background: var(--bg-1);
}
.multi-hdr > .empty { }
.multi-day-hdr {
  text-align: center; padding: 8px 0;
  font-size: 11px; color: var(--t-2);
  border-left: 0.5px solid var(--sep-th);
  cursor: pointer;
}
.multi-day-hdr.today .multi-day-num { background: var(--red); color: white; font-weight: 600; }
.multi-day-hdr.selected .multi-day-num { background: var(--t-1); color: var(--bg-1); font-weight: 600; }
.multi-day-hdr.today.selected .multi-day-num { background: var(--red); }
.multi-day-name { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
.multi-day-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 15px; margin-top: 2px;
}
.multi-body { flex: 1; min-height: 0; overflow-y: scroll; -webkit-overflow-scrolling: touch; touch-action: pan-y; }
.multi-cols { position: relative; height: calc(24 * 60px); display: grid; grid-template-columns: 56px repeat(7, 1fr); }
.multi-col { position: relative; border-left: 0.5px solid var(--sep-th); }
.multi-col-events { position: absolute; inset: 0; pointer-events: none; }
.multi-col-events .tl-event { padding: 2px 4px; font-size: 10px; }
.multi-times { position: relative; }
.multi-times .hour-lbl {
  position: absolute; right: 8px; width: auto;
  font-size: 10px;
}

/* ─────────────────────────────────────────────────────────────────────────────
   LIST VIEW
   ───────────────────────────────────────────────────────────────────────────── */

.list-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-1); }
.list-filters {
  display: flex; gap: var(--s-2); padding: var(--s-3) var(--s-4);

.fc {

}
.fc.on { background: var(--blue); color: white; }
.list-body {
  flex: 1; min-height: 0; overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--s-6);

}
.list-section-hdr {
  padding: var(--s-4) var(--s-4) 4px;

}
.list-section-hdr.today { color: var(--blue); }

/* ─────────────────────────────────────────────────────────────────────────────
   MODAL — Apple-style sheet
   ───────────────────────────────────────────────────────────────────────────── */

.backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(2px);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadein .15s ease-out;
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@media (min-width: 600px) { .backdrop { align-items: center; } }

.sheet {
  position: relative;
  width: 100%; max-width: 520px;
  background: var(--bg-1);
  border-radius: 14px 14px 0 0;
  display: flex; flex-direction: column;
  max-height: calc(100vh - 60px);
  max-height: calc(100dvh - 60px);
  padding-bottom: var(--safe-b);
  animation: slideup .25s cubic-bezier(.32,.72,0,1);
  box-shadow: 0 -10px 40px rgba(0,0,0,.4);
}
@keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
@media (min-width: 600px) { .sheet { border-radius: 14px; animation: pop .2s ease-out; } }
@keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.sheet-hdr {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding: var(--s-3) var(--s-4);
  border-bottom: 0.5px solid var(--sep);
  flex-shrink: 0;
}
.sheet-title { font-size: 17px; font-weight: 600; text-align: center; }
.sheet-cancel { color: var(--blue); font-size: 17px; padding: var(--s-2); justify-self: start; }
.sheet-save { color: var(--blue); font-size: 17px; font-weight: 600; padding: var(--s-2); justify-self: end; }
.sheet-save:disabled { opacity: .4; }

.sheet-body {
  flex: 1; overflow-y: auto;
  padding: var(--s-4); display: flex; flex-direction: column; gap: var(--s-3);
  -webkit-overflow-scrolling: touch;
}

.type-select { display: flex; gap: var(--s-2); }

  flex: 1; padding: 10px; border-radius: var(--r-1);

}
.type-opt-ic { font-size: 20px; }
.type-opt.on.note  { background: rgba(255,149,0,.15);  color: var(--c-note);  border-color: var(--c-note); }
.type-opt.on.todo  { background: rgba(0,122,255,.15);  color: var(--c-todo);  border-color: var(--c-todo); }
.type-opt.on.event { background: rgba(175,82,222,.15); color: var(--c-event); border-color: var(--c-event); }

.field-group {
  background: var(--bg-2); border-radius: var(--r-2);
  overflow: hidden;
}
.field-row {
  display: flex; align-items: center; gap: var(--s-3);
  padding: 10px var(--s-3);

}

.field-label { color: var(--t-1); flex: 1; }

}
.field-row input[type="date"]::-webkit-calendar-picker-indicator,

}

  filter: invert(.7);
}

.toggle {

  background: var(--bg-3); position: relative;

}
.toggle.on { background: var(--green); }
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 27px; height: 27px; border-radius: 50%;

  box-shadow: 0 2px 4px rgba(0,0,0,.2);
}

.attach-row {
  display: flex; gap: var(--s-2);
  padding: var(--s-3) var(--s-3);
}
.attach-btn {
  flex: 1; padding: 10px;

}

/* ─────────────────────────────────────────────────────────────────────────────

.ctx-backdrop {

.cmd-row {

}
.cmd-row.focused, .cmd-row:hover { background: rgba(10,132,255,.12); }
.cmd-row-ic {

  display: flex; align-items: center; justify-content: center;

}
.cmd-row-ic.note  { background: rgba(255,149,0,.2);  color: var(--c-note); }
.cmd-row-ic.todo  { background: rgba(0,122,255,.2);  color: var(--c-todo); }
.cmd-row-ic.event { background: rgba(175,82,222,.2); color: var(--c-event); }
.cmd-row-ic.date  { background: rgba(48,209,88,.2);  color: var(--green); }
.cmd-row-body { flex: 1; min-width: 0; }
.cmd-row-title { color: var(--t-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cmd-row-sub { color: var(--t-2); font-size: 12px; margin-top: 1px; }
.cmd-row-tag { display: inline-block; margin-left: 8px; padding: 1px 7px; border-radius: 999px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
  vertical-align: middle; }
.cmd-row-tag.note  { background: rgba(255,149,0,.18);  color: var(--c-note); }
.cmd-row-tag.todo  { background: rgba(0,122,255,.18);  color: var(--c-todo); }
.cmd-row-tag.event { background: rgba(175,82,222,.18); color: var(--c-event); }
.cmd-empty { padding: var(--s-6) var(--s-4); text-align: center; color: var(--t-3); font-size: 14px; }

/* ─────────────────────────────────────────────────────────────────────────────
   SETTINGS PANEL
   ───────────────────────────────────────────────────────────────────────────── */

.settings-panel {
  position: relative;
  background: var(--bg-1);
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column;
  border-radius: 14px 14px 0 0;
  max-height: 88vh; max-height: 88dvh;
  padding-bottom: var(--safe-b);
  animation: slideup .25s cubic-bezier(.32,.72,0,1);
}
@media (min-width: 600px) { .settings-panel { border-radius: 14px; } }

.settings-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--s-3) var(--s-4);
  border-bottom: 0.5px solid var(--sep);
}
.settings-body {
  overflow-y: auto;
  padding: var(--s-4);
  display: flex; flex-direction: column; gap: var(--s-4);
}

  display: flex; align-items: center; gap: var(--s-3);

}

.settings-name { font-size: 17px; font-weight: 600; }
.settings-email { font-size: 13px; color: var(--t-2); }

.settings-list { background: var(--bg-2); border-radius: var(--r-2); overflow: hidden; }
.settings-item {
  display: flex; align-items: center; gap: var(--s-3);
  padding: 12px var(--s-4);
  font-size: 16px;
  cursor: pointer;
}
.settings-item:active { background: var(--bg-3); }
.settings-item + .settings-item { border-top: 0.5px solid var(--sep-th); }
.settings-item-arrow { color: var(--t-3); margin-left: auto; }
.settings-item.danger { color: var(--red); }

<script>
'use strict';

/* ═════════════════════════════════════════════════════════════════════════════
   LIFEOS — Sessions 1 & 2 combined.
   Single file, organized as discrete modules:

     1. UTILS         — pure helpers, DOM builder
     2. CONFIG        — constants, schema
     3. STATE         — single tree, update fn, subscribe
     4. ACTIONS       — every mutation, named
     5. SYNC          — Sheets adapter, write queue, schema migration
     6. AUTH          — Google OAuth flow
     7. GESTURES      — single pointer-event dispatcher
     8. DATE PARSER   — natural language → Date
     9. MARKDOWN      — minimal renderer
    10. ATTACHMENTS   — image capture / Drive upload
    11. REMINDERS     — schedule + notify
    12. RENDER        — slot-based, signature-keyed re-renders
    13. COMPONENTS    — TopBar, Month, Day (with mode), List, Modal,
                       ContextMenu, CommandPalette, Settings
    14. BOOT          — bootstrap
   ═════════════════════════════════════════════════════════════════════════════ */


/* ─── 1. UTILS ──────────────────────────────────────────────────────────── */

const $       = id => document.getElementById(id);
const p2      = n => String(n).padStart(2, '0');
const today   = () => new Date();
const ds      = d => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const parseDs = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const addDays = (d, n) => new Date(d.getFullYear(), d.getMonth(), d.getDate()+n);
const addMos  = (d, n) => new Date(d.getFullYear(), d.getMonth()+n, 1);
const sameDay = (a, b) => ds(a) === ds(b);
const wkStart = d => addDays(d, -d.getDay());
const startOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);

const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const bool = x => x ? 'TRUE' : 'FALSE';
const esc  = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const fmtTime = t => {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  return `${h%12 || 12}:${p2(m)} ${h>=12 ? 'PM' : 'AM'}`;
};
const fmtTimeShort = t => {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  const ap = h>=12 ? 'PM' : 'AM';
  return m === 0 ? `${h%12||12} ${ap}` : `${h%12||12}:${p2(m)} ${ap}`;
};
const fmtHourLabel = h => h === 0 ? '' : h === 12 ? 'noon' : h < 12 ? `${h} AM` : `${h-12} PM`;

/* DOM builder. Components are pure functions returning elements built with this. */
const el = (tag, attrs, ...kids) => {
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    const v = attrs[k];
    if (v == null || v === false) continue;
    if      (k === 'class')   n.className = v;
    else if (k === 'style')   typeof v === 'string' ? n.setAttribute('style', v) : Object.assign(n.style, v);
    else if (k === 'dataset') Object.assign(n.dataset, v);
    else if (k === 'gesture') Gestures.on(n, v);
    else if (k === 'ref')     v(n);
    else if (k === 'html')    n.innerHTML = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(), v);
    else                      n.setAttribute(k, v === true ? '' : String(v));
  }
  for (const c of kids.flat(Infinity)) {
    if (c == null || c === false) continue;
    n.append(c.nodeType ? c : document.createTextNode(String(c)));
  }
  return n;
};

const Icon = {
  back:    () => svg('M15 18l-6-6 6-6', 2),
  plus:    () => svg('M12 5v14M5 12h14', 2.5),
  cal:     () => svg('M19 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2zM3 10h18M16 2v4M8 2v4', 1.8),
  list:    () => svg('M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01', 2),
  search:  () => svg('M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35', 2),
  user:    () => svg('M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z', 1.8),
  cam:     () => svg('M14.5 4h-5L7 7H4a2 2 0 00-2 2v9a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2h-3l-2.5-3zM12 17a4 4 0 100-8 4 4 0 000 8z', 1.7),
  pic:     () => svg('M3 3h18v18H3zM8.5 11a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM21 15l-5-5L5 21', 1.7),
  mic:     () => svg('M9 2h6v11a3 3 0 01-6 0V2zM5 11a7 7 0 0014 0M12 18v4', 1.7),
  paperclip: () => svg('M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17a2 2 0 11-2.83-2.83l8.49-8.48', 1.7),
  trash:   () => svg('M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2', 1.7),
  edit:    () => svg('M12 20h9M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4 12.5-12.5z', 1.7),
  check:   () => svg('M5 13l4 4L19 7', 2.5),
  close:   () => svg('M18 6L6 18M6 6l12 12', 2),
  bell:    () => svg('M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0', 1.7),
};
function svg(d, w) {
  const ns = 'http://www.w3.org/2000/svg';
  const el = document.createElementNS(ns, 'svg');
  el.setAttribute('viewBox','0 0 24 24'); el.setAttribute('fill','none');
  el.setAttribute('stroke','currentColor'); el.setAttribute('stroke-width', w || 1.8);
  el.setAttribute('stroke-linecap','round'); el.setAttribute('stroke-linejoin','round');
  const p = document.createElementNS(ns,'path'); p.setAttribute('d', d);
  el.appendChild(p);
  return el;
}


/* ─── 2. CONFIG ─────────────────────────────────────────────────────────── */

const CLIENT_ID  = '348308608113-0mava56gnj2bqn8lqsd80k366643nr6p.apps.googleusercontent.com';
const SCOPE      = 'https://www.googleapis.com/auth/spreadsheets'
               + ' https://www.googleapis.com/auth/drive.file'
               + ' https://www.googleapis.com/auth/drive.metadata.readonly';
const SHEET_NAME = 'LifeOS';
const TAB_NAME   = 'Items';

const HEADER = [
  'id','type','content','date','time','completed','created_at','deleted','end_time',
  'rem_start','rem_every','rem_times',
  'att_kind','att_drive_id','att_thumb','att_name','att_dur','att_size'
];

const MON  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DOWA = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW1 = ['S','M','T','W','T','F','S'];


/* ─── 3. STATE ──────────────────────────────────────────────────────────── */

const state = {
  items:    new Map(),                        // id → Item
  itemsVer: 0,                                // bump on every item change (for slot signatures)
  view:     { name: 'month', date: today(), dayMode: 'day' },  // 'month' | 'day' | 'list'
  history:  [],
  modal:    null,                             // null | { mode, item, ver }
  ctx:      null,                             // null | { x, y, item }
  cmd:      null,                             // null | { open: true }
  settings: null,                             // null | { open: true }
  toast:    null,
  dark:     localStorage.getItem('lo_dark') !== 'false',
  user:     null,
  sheetId:  localStorage.getItem('lo_sid') || null,
  tabId:    null,
  token:    null,
  tokenExp: 0,
  status:   'splash',
};

const subs = new Set();
const subscribe = fn => { subs.add(fn); return () => subs.delete(fn); };
const notify = () => subs.forEach(fn => fn(state));


/* ─── 4. ACTIONS ────────────────────────────────────────────────────────── */

const Actions = {
  navigate(view) { state.history.push(state.view); state.view = view; notify(); },
  back() { if (!state.history.length) return; state.view = state.history.pop(); notify(); },
  goToday() { state.view = { ...state.view, date: today() }; notify(); },
  selectDate(date) { state.view = { ...state.view, date }; notify(); },
  setDayMode(mode) { state.view = { ...state.view, dayMode: mode }; notify(); },

  upsertItem(item) { state.items.set(item.id, item); state.itemsVer++; notify(); },
  deleteItem(id)   { state.items.delete(id);          state.itemsVer++; notify(); },

  openNew(date) {
    state.modal = { mode: 'new', item: blankItem(date || state.view.date), ver: 0 };
    notify();
  },
  openEdit(id) {
    const it = state.items.get(id); if (!it) return;
    state.modal = { mode: 'edit', item: { ...it }, ver: 0 };
    notify();
  },
  closeModal() { state.modal = null; notify(); },

  openCtx(x, y, item) { state.ctx = { x, y, item }; notify(); },
  closeCtx() { state.ctx = null; notify(); },

  openCmd()  { state.cmd = { open: true }; notify(); },
  closeCmd() { state.cmd = null; notify(); },

  openSettings()  { state.settings = { open: true }; notify(); },
  closeSettings() { state.settings = null; notify(); },

  toast(msg) {
    state.toast = { msg, ts: Date.now() }; notify();
    const ts = state.toast.ts;
    setTimeout(() => { if (state.toast?.ts === ts) { state.toast = null; notify(); } }, 2400);
  },

  setDark(dark) {
    state.dark = dark;
    localStorage.setItem('lo_dark', dark);
    document.documentElement.classList.toggle('dark', dark);
    document.documentElement.classList.toggle('light', !dark);
    notify();
  },

  setStatus(status) { state.status = status; notify(); },
};

const blankItem = (date) => ({
  id: uid(),
  type: 'note',
  content: '',
  date: date ? ds(date) : '',
  time: '', endTime: '',
  completed: false,
  createdAt: new Date().toISOString(),
  deleted: false,
  remStart: null, remEvery: 0, remTimes: 1,
  attKind: null, attDriveId: '', attThumb: '', attName: '', attDur: 0, attSize: 0,
  _row: null,
});


/* ─── 5. SYNC ───────────────────────────────────────────────────────────── */

const Sync = (() => {
  const BASE  = 'https://sheets.googleapis.com/v4/spreadsheets';
  const DRIVE = 'https://www.googleapis.com/drive/v3';
  const auth  = () => ({ Authorization: `Bearer ${state.token}`, 'Content-Type': 'application/json' });

  const req = (m, url, body) => fetch(url, {
    method: m, headers: auth(), body: body && JSON.stringify(body)
  }).then(r => r.ok ? r.json() : r.text().then(t => Promise.reject(new Error(`${r.status}: ${t}`))));

  const get  = p     => req('GET',  `${BASE}${p}`);
  const post = (p,b) => req('POST', `${BASE}${p}`, b);
  const put  = (p,b) => req('PUT',  `${BASE}${p}`, b);

  const toRow = i => [
    i.id, i.type, i.content, i.date || '', i.time || '',
    bool(i.completed), i.createdAt, bool(i.deleted), i.endTime || '',
    i.remStart != null ? String(i.remStart) : '', String(i.remEvery || 0), String(i.remTimes || 1),
    i.attKind || '', i.attDriveId || '', i.attThumb || '',
    i.attName || '', i.attDur ? String(i.attDur) : '', i.attSize ? String(i.attSize) : '',
  ];

  const isOldRow = row => {
    const j = row[9];
    if (!j) return false;
    return j.startsWith('{') || j.startsWith('%7B') || j.includes('"');
  };

  const tryParse = s => {
    try { return JSON.parse(s.startsWith('%7B') ? decodeURIComponent(s) : s); }
    catch (_) { return null; }
  };

  const fromRow = (row, idx) => {
    const item = {
      id: row[0] || '', type: row[1] || 'note', content: row[2] || '',
      date: row[3] || '', time: row[4] || '',
      completed: row[5] === 'TRUE',
      createdAt: row[6] || '', deleted: row[7] === 'TRUE',
      endTime: row[8] || '',
      remStart: null, remEvery: 0, remTimes: 1,
      attKind: null, attDriveId: '', attThumb: '', attName: '', attDur: 0, attSize: 0,
      _row: idx + 2,
    };
    if (isOldRow(row)) {
      const r = tryParse(row[9]) || {};
      item.remStart = r.start ?? null;
      item.remEvery = r.every ?? 0;
      item.remTimes = r.times ?? 1;
      const a = tryParse(row[10] || '') || {};
      if (a.type) {
        item.attKind = a.type; item.attDriveId = a.id || '';
        item.attThumb = a.thumb || ''; item.attDur = a.dur || 0;
      }
    } else {
      item.remStart = row[9]  ? +row[9]  : null;
      item.remEvery = row[10] ? +row[10] : 0;
      item.remTimes = row[11] ? +row[11] : 1;
      item.attKind     = row[12] || null;
      item.attDriveId  = row[13] || '';
      item.attThumb    = row[14] || '';
      item.attName     = row[15] || '';
      item.attDur      = row[16] ? +row[16] : 0;
      item.attSize     = row[17] ? +row[17] : 0;
    }
    return item;
  };

  const findOrCreate = async () => {
    if (state.sheetId) {
      try { await get(`/${state.sheetId}?fields=spreadsheetId`); return; }
      catch (_) { state.sheetId = null; localStorage.removeItem('lo_sid'); }
    }
    const found = await fetch(
      `${DRIVE}/files?q=${encodeURIComponent(`name='${SHEET_NAME}' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false`)}&fields=files(id)&orderBy=modifiedTime+desc&pageSize=5`,
      { headers: auth() }
    ).then(r => r.json());
    if (found.files?.length) {
      state.sheetId = found.files[0].id;
    } else {
      const ss = await post('', {
        properties: { title: SHEET_NAME },
        sheets: [{ properties: { title: TAB_NAME } }],
      });
      state.sheetId = ss.spreadsheetId;
    }
    localStorage.setItem('lo_sid', state.sheetId);
  };

  const ensureTab = async () => {
    const meta = await get(`/${state.sheetId}?fields=sheets.properties`);
    const tab = meta.sheets.find(s => s.properties.title === TAB_NAME);
    state.tabId = (tab || meta.sheets[0]).properties.sheetId;
    if (!tab) {
      await post(`/${state.sheetId}:batchUpdate`, {
        requests: [{ addSheet: { properties: { title: TAB_NAME } } }],
      });
    }
    await put(`/${state.sheetId}/values/${TAB_NAME}!A1:R1?valueInputOption=RAW`,
              { values: [HEADER] });
  };

  const load = async () => {
    await findOrCreate();
    await ensureTab();
    const data = await get(`/${state.sheetId}/values/${TAB_NAME}!A2:R3000`);
    const rows = data.values || [];
    state.items.clear();
    for (let i = 0; i < rows.length; i++) {
      const item = fromRow(rows[i], i);
      if (item.id && !item.deleted) state.items.set(item.id, item);
    }
    state.itemsVer++;
    cacheItems();
  };

  let _q = Promise.resolve();
  const queue = fn => { const next = _q.catch(()=>{}).then(fn); _q = next.catch(()=>{}); return next; };

  const nextRow = () => {
    let max = 1;
    for (const it of state.items.values()) if (it._row && it._row > max) max = it._row;
    return max + 1;
  };

  const writeRow = (rowIdx, row) =>
    post(`/${state.sheetId}:batchUpdate`, { requests: [{ updateCells: {
      start: { sheetId: state.tabId, rowIndex: rowIdx, columnIndex: 0 },
      rows:  [{ values: row.map(v => ({ userEnteredValue: { stringValue: String(v ?? '') } })) }],
      fields: 'userEnteredValue',
    }}]});

  const insert = item => queue(async () => {
    if (!state.tabId) await ensureTab();
    const rowNum = nextRow();
    item._row = rowNum;
    state.items.set(item.id, item);
    await writeRow(rowNum - 1, toRow(item));
    cacheItems();
  });

  const update = item => queue(async () => {
    if (!item._row) return insert(item);
    state.items.set(item.id, item);
    await writeRow(item._row - 1, toRow(item));
    cacheItems();
  });

  const remove = item => queue(async () => {
    if (!item._row) return;
    await post(`/${state.sheetId}:batchUpdate`, { requests: [{ deleteDimension: {
      range: { sheetId: state.tabId, dimension: 'ROWS', startIndex: item._row - 1, endIndex: item._row },
    }}]});
    await load();
  });

  const push = item => item._row ? update(item) : insert(item);

  const cacheItems = () => {
    try { localStorage.setItem('lo_cache', JSON.stringify([...state.items.values()])); }
    catch (_) {}
  };
  const restoreCache = () => {
    try {
      const arr = JSON.parse(localStorage.getItem('lo_cache') || '[]');
      state.items.clear();
      for (const it of arr) state.items.set(it.id, it);
      state.itemsVer++;
    } catch (_) {}
  };

  return { load, push, remove, restoreCache };
})();


/* ─── 6. AUTH ───────────────────────────────────────────────────────────── */

const Auth = {
  whenGIS(cb, tries = 0) {
    if (typeof google !== 'undefined' && google.accounts?.oauth2) return cb();
    if (tries > 80) return;
    setTimeout(() => Auth.whenGIS(cb, tries + 1), 100);
  },
  signIn() {
    if (typeof google === 'undefined') return Actions.toast('Google script not loaded');
    google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPE,
      callback: async r => {
        if (r.error) return Actions.toast('Sign-in: ' + r.error);
        state.token = r.access_token;
        state.tokenExp = Date.now() + r.expires_in * 1000 - 60000;
        await Auth.boot();
      },
    }).requestAccessToken({ prompt: 'select_account' });
  },
  silentRefresh() {
    return new Promise(resolve => {
      if (Date.now() < state.tokenExp) return resolve(true);
      if (typeof google === 'undefined') return resolve(false);
      google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPE,
        callback: r => {
          if (r.error) return resolve(false);
          state.token = r.access_token;
          state.tokenExp = Date.now() + r.expires_in * 1000 - 60000;
          resolve(true);
        },
      }).requestAccessToken({ prompt: '' });
    });
  },
  async boot() {
    Actions.setStatus('loading');
    try {
      await Sync.load();
      Auth.fetchUser();
      Actions.setStatus('ready');
      Reminders.scheduleAll();
    } catch (e) {
      console.error(e);
      Actions.toast('Could not load: ' + e.message);
      Actions.setStatus('auth');
    }
  },
  async fetchUser() {
    if (!state.token) return;
    try {
      const u = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
        { headers: { Authorization: `Bearer ${state.token}` } }).then(r => r.json());
      state.user = u; notify();
    } catch (_) {}
  },
  signOut() {
    state.token = null; state.tokenExp = 0;
    state.items.clear(); state.user = null;
    state.itemsVer++;
    localStorage.removeItem('lo_cache');
    Actions.setStatus('auth');
    Actions.closeSettings();
  },
};


/* ─── 7. GESTURES ───────────────────────────────────────────────────────── */

const Gestures = (() => {
  const handlers = new WeakMap();
  let p = null;
  const find = target => {
    for (let n = target; n; n = n.parentElement) {
      if (handlers.has(n)) return [n, handlers.get(n)];
    }
    return [null, null];
  };
  const on = (node, fns) => { handlers.set(node, fns); };

  addEventListener('pointerdown', e => {
    if (!e.isPrimary) return;
    const [node, fns] = find(e.target);
    if (!fns) return;
    p = { node, fns, x0: e.clientX, y0: e.clientY, t0: Date.now(),
          moved: false, longTimer: null, consumed: false };
    if (fns.onLongPress) {
      p.longTimer = setTimeout(() => {
        if (p && !p.moved) { p.consumed = true; fns.onLongPress({ x: p.x0, y: p.y0, node }); }
      }, 500);
    }
  });
  addEventListener('pointermove', e => {
    if (!p) return;
    const dx = e.clientX - p.x0, dy = e.clientY - p.y0;
    if (!p.moved && Math.hypot(dx, dy) > 10) {
      p.moved = true; clearTimeout(p.longTimer);
      if (p.fns.onDragStart) p.fns.onDragStart({ x: p.x0, y: p.y0 });
    }
    if (p.moved && p.fns.onDrag) p.fns.onDrag({ dx, dy });
  });
  addEventListener('pointerup', e => {
    if (!p) return;
    clearTimeout(p.longTimer);
    if (!p.consumed) {
      if (!p.moved && p.fns.onTap) p.fns.onTap({ x: p.x0, y: p.y0, node: p.node, event: e });
      else if (p.moved) {
        const dx = e.clientX - p.x0, dy = e.clientY - p.y0;
        if (p.fns.onDragEnd) p.fns.onDragEnd({ dx, dy });
        else if (p.fns.onSwipe) p.fns.onSwipe({ dx, dy });
      }
    }
    p = null;
  });
  addEventListener('pointercancel', () => { if (p) clearTimeout(p.longTimer); p = null; });
  return { on };
})();


/* ─── 8. DATE PARSER ────────────────────────────────────────────────────── */

const DateParser = (() => {
  const HOLIDAYS = {
    christmas:    y => new Date(y, 11, 25),
    newyear:      y => new Date(y, 0, 1),
    newyears:     y => new Date(y, 0, 1),
    halloween:    y => new Date(y, 9, 31),
    valentines:   y => new Date(y, 1, 14),
    thanksgiving: y => { const d = new Date(y, 10, 1);
                         const off = (4 - d.getDay() + 7) % 7;
                         return new Date(y, 10, 1 + off + 21); },
    july4:        y => new Date(y, 6, 4),
  };

  const parse = raw => {
    const s = (raw || '').trim();
    if (!s) return null;
    const lc = s.toLowerCase();
    const t  = today();

    if (lc === 'today') return t;
    if (/^tom(orrow)?$/.test(lc))  return addDays(t, 1);
    if (/^yest(erday)?$/.test(lc)) return addDays(t, -1);

    const dow = lc.match(/^(next|this|last)\s+(sun|mon|tue|wed|thu|fri|sat)/);
    if (dow) {
      const target = ['sun','mon','tue','wed','thu','fri','sat'].indexOf(dow[2]);
      let diff = target - t.getDay();
      if (dow[1] === 'next' && diff <= 0) diff += 7;
      if (dow[1] === 'last' && diff >= 0) diff -= 7;
      if (dow[1] === 'this' && diff < 0)  diff += 7;
      return addDays(t, diff);
    }

    const rel = lc.match(/^(?:in\s+)?(\d+)\s+(day|week|month|year)s?(\s+ago)?$/);
    if (rel) {
      const n = parseInt(rel[1], 10) * (rel[3] ? -1 : 1);
      const unit = rel[2];
      const d = new Date(t);
      if      (unit === 'day')   d.setDate(d.getDate() + n);
      else if (unit === 'week')  d.setDate(d.getDate() + n * 7);
      else if (unit === 'month') d.setMonth(d.getMonth() + n);
      else if (unit === 'year')  d.setFullYear(d.getFullYear() + n);
      return d;
    }

    const yMatch = s.match(/(\d{4})/);
    const year   = yMatch ? +yMatch[1] : t.getFullYear();
    const word   = lc.replace(/\d{4}/, '').replace(/[^a-z]/g, '');
    const fn     = HOLIDAYS[word];
    if (fn) return fn(year);

    // "apr 15" / "april 15, 1997" — explicit month/day, default current year, roll to next year if past
    const MNAMES = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const md = lc.match(/^(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s+(\d{1,2})(?:\s*,?\s*(\d{2,4}))?$/);
    if (md) {
      let yr = md[3] ? +md[3] : t.getFullYear();
      if (yr < 100) yr += 2000;
      const dt = new Date(yr, MNAMES.indexOf(md[1]), +md[2]);
      if (!md[3] && dt < t) dt.setFullYear(yr + 1);
      return dt;
    }

    const d = new Date(s);
    if (!isNaN(d.getTime())) return d;
    return null;
  };

  const describe = d => {
    if (!d) return null;
    const t    = today();
    const days = Math.round((d - t) / 86400000);
    const main = `${DOW[d.getDay()]}, ${MON[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    let rel = '';
    if      (days === 0)               rel = ' · today';
    else if (days === 1)               rel = ' · tomorrow';
    else if (days === -1)              rel = ' · yesterday';
    else if (days > 0 && days < 365)   rel = ` · in ${days} days`;
    else if (days < 0 && days > -365)  rel = ` · ${-days} days ago`;
    else if (Math.abs(days) >= 365) {
      const yrs = Math.round(Math.abs(days) / 365);
      rel = days > 0 ? ` · in ${yrs} year${yrs>1?'s':''}` : ` · ${yrs} year${yrs>1?'s':''} ago`;
    }
    return main + rel;
  };

  return { parse, describe };
})();


/* ─── 8b. QUICK-PARSE ──────────────────────────────────────────────────── */
/* Parse a single line into {type, title, date, time, endTime}.
   Returns null if no time and no date phrase found (caller falls back to search). */

const QuickParse = (() => {
  const pad = n => String(n).padStart(2, '0');

  const TIME_RANGE = /\b(\d{1,2})(?::(\d{2}))?\s*(?:-|to|–)\s*(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\b/i;
  const TIME_12    = /\b(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/i;
  const TIME_24    = /\b([01]?\d|2[0-3]):([0-5]\d)\b/;

  const DATE_RES = [
    /\btoday\b/i,
    /\btom(?:orrow)?\b/i,
    /\byest(?:erday)?\b/i,
    /\b(?:next|this|last)\s+(?:sun|mon|tue|wed|thu|fri|sat)(?:day|nesday|sday|urday)?\b/i,
    /\b(?:sun|mon|tue|wed|thu|fri|sat)(?:day|nesday|sday|urday)?\b/i,
    /\b(?:in\s+)?\d+\s+(?:day|week|month|year)s?(?:\s+ago)?\b/i,
    /\b(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s+\d{1,2}(?:\s*,?\s*\d{2,4})?\b/i,
    /\b\d{1,2}\/\d{1,2}(?:\/\d{2,4})?\b/,
  ];

  const TODO_LEAD  = /^\s*(?:remind\s+me\s+to\s+|todo:?\s+|task:?\s+|t:\s+)/i;
  const NOTE_LEAD  = /^\s*(?:note:?\s+|n:\s+)/i;
  const TODO_VERB  = /^(?:buy|call|email|text|finish|read|review|send|submit|pay|book|order|fix|write|check|file|schedule|renew|cancel|reply|ship|return|update|clean|wash|cook|prep)\b/i;
  const EVENT_HINT = /\b(?:meeting|lunch|dinner|breakfast|coffee|standup|sync|interview|appointment|flight|train|class|session|workout|gym|brunch|party|wedding)\b/i;

  const parseTime = s => {
    const rng = s.match(TIME_RANGE);
    if (rng) {
      const ampm = (rng[5] || '').toLowerCase();
      let h1 = +rng[1], m1 = +(rng[2] || 0);
      let h2 = +rng[3], m2 = +(rng[4] || 0);
      if (ampm === 'pm') { if (h1 < 12) h1 += 12; if (h2 < 12) h2 += 12; }
      if (ampm === 'am' && h1 === 12) h1 = 0;
      // if start has no ampm but end does (e.g. "9-10am"), apply to start too
      return { time: `${pad(h1)}:${pad(m1)}`, endTime: `${pad(h2)}:${pad(m2)}`, match: rng[0] };
    }
    const t12 = s.match(TIME_12);
    if (t12) {
      let h = +t12[1], m = +(t12[2] || 0);
      const ampm = t12[3].toLowerCase();
      if (ampm === 'pm' && h < 12) h += 12;
      if (ampm === 'am' && h === 12) h = 0;
      return { time: `${pad(h)}:${pad(m)}`, endTime: '', match: t12[0] };
    }
    const t24 = s.match(TIME_24);
    if (t24) return { time: `${pad(+t24[1])}:${t24[2]}`, endTime: '', match: t24[0] };
    return null;
  };

  const parseDate = s => {
    for (const re of DATE_RES) {
      const m = s.match(re);
      if (!m) continue;
      let phrase = m[0];
      // bare day-of-week → "this DOW" (gives today if today, else next occurrence in week)
      if (/^(?:sun|mon|tue|wed|thu|fri|sat)/i.test(phrase) && !/^(?:next|this|last)/i.test(phrase)) {
        phrase = 'this ' + phrase;
      }
      const d = DateParser.parse(phrase);
      if (d) return { date: d, match: m[0] };
    }
    return null;
  };

  const inferType = (raw, hasTime, hasRange) => {
    if (NOTE_LEAD.test(raw)) return 'note';
    if (TODO_LEAD.test(raw)) return 'todo';
    if (hasRange) return 'event';
    if (EVENT_HINT.test(raw)) return 'event';
    if (TODO_VERB.test(raw)) return 'todo';
    if (hasTime) return 'event';
    return 'todo';
  };

  const parse = raw => {
    const s = (raw || '').trim();
    if (!s) return null;

    const tp = parseTime(s);
    let stripped = tp ? s.replace(tp.match, ' ') : s;

    const dp = parseDate(stripped);
    if (dp) stripped = stripped.replace(dp.match, ' ');

    // need at least a time or a date phrase to count as quick-add
    if (!tp && !dp) return null;

    const type = inferType(s, !!tp, !!(tp && tp.endTime));

    const title = stripped
      .replace(NOTE_LEAD, '').replace(TODO_LEAD, '')
      .replace(/\b(?:on|at|@)\b/gi, ' ')
      .replace(/\s+/g, ' ')
      .replace(/^[\s,\-@]+|[\s,\-@]+$/g, '')
      .trim();

    // Pure date phrase with no time and no title → defer to date-jump row
    if (!tp && !title) return null;

    return {
      type, title,
      date:    dp ? dp.date : today(),
      time:    tp ? tp.time : '',
      endTime: tp ? tp.endTime : '',
    };
  };

  return { parse };
})();


/* ─── 9. MARKDOWN ──────────────────────────────────────────────────────── */

const Markdown = (() => {
  const inline = s => {
    let h = String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    h = h.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
    h = h.replace(/\*(.+?)\*/g,         '<em>$1</em>');
    h = h.replace(/`(.+?)`/g,           '<code class="md-code">$1</code>');
    h = h.replace(/(https?:\/\/[^\s<&]+)/g, '<a href="$1" target="_blank" rel="noopener" class="md-link" onclick="event.stopPropagation()">$1</a>');
    return h;
  };
  const render = raw => {
    if (!raw) return '';
    return raw.split('\n').map(line => {
      let m;
      if (m = line.match(/^> (.*)/))         return `<span class="md-q">${inline(m[1])}</span>`;
      if (m = line.match(/^### (.*)/))       return `<span class="md-h3">${inline(m[1])}</span>`;
      if (m = line.match(/^## (.*)/))        return `<span class="md-h2">${inline(m[1])}</span>`;
      if (m = line.match(/^# (.*)/))         return `<span class="md-h1">${inline(m[1])}</span>`;
      if (m = line.match(/^[-*+] (.*)/))     return `<span class="md-li">•&nbsp;${inline(m[1])}</span>`;
      if (m = line.match(/^(\d+)\. (.*)/))   return `<span class="md-li">${m[1]}.&nbsp;${inline(m[2])}</span>`;
      if (line === '')                        return '<span class="md-br"></span>';
      return `<span>${inline(line)}</span>`;
    }).join('');
  };
  return { render };
})();


/* ─── 10. ATTACHMENTS ──────────────────────────────────────────────────── */

const Attach = (() => {
  /* Compress an image file into:
     - full: a Blob suitable for upload to Drive (max 1200px, JPEG q .8)
     - thumb: a base64 data URL (max 120px, JPEG q .5) for inline display
     The thumbnail (3-5KB) lives in the sheet, the full image in Drive. */
  const compress = file => new Promise((ok, fail) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const draw = (max) => {
        const r = Math.min(max / img.width, max / img.height, 1);
        const cv = document.createElement('canvas');
        cv.width = Math.round(img.width * r); cv.height = Math.round(img.height * r);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        return cv;
      };
      draw(1200).toBlob(blob => {
        const thumb = draw(120).toDataURL('image/jpeg', 0.5);
        ok({ full: blob, thumb });
      }, 'image/jpeg', 0.8);
    };
    img.onerror = fail;
    img.src = url;
  });

  const uploadDrive = async (blob, name, mime) => {
    const meta = JSON.stringify({ name, mimeType: mime });
    const form = new FormData();
    form.append('metadata', new Blob([meta], { type: 'application/json' }));
    form.append('file', blob);
    const r = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      { method: 'POST', headers: { Authorization: `Bearer ${state.token}` }, body: form }
    );
    if (!r.ok) throw new Error(await r.text());
    return (await r.json()).id;
  };

  /* Pick image from gallery or camera, return { kind, driveId, thumb } */
  const pickImage = (camera = false) => new Promise((ok, fail) => {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    if (camera) inp.capture = 'environment';
    inp.onchange = async () => {
      const file = inp.files?.[0];
      if (!file) return ok(null);
      try {
        const { full, thumb } = await compress(file);
        const id = await uploadDrive(full, `photo-${Date.now()}.jpg`, 'image/jpeg');
        ok({ kind: 'image', driveId: id, thumb });
      } catch (e) { fail(e); }
    };
    inp.click();
  });

  const fetchDriveBlob = async (driveId) => {
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${driveId}?alt=media`,
      { headers: { Authorization: `Bearer ${state.token}` } });
    if (!r.ok) throw new Error(r.status);
    return r.blob();
  };

  const _cache = {};
  const showImage = async driveId => {
    let url = _cache[driveId];
    if (!url) {
      try { url = URL.createObjectURL(await fetchDriveBlob(driveId)); _cache[driveId] = url; }
      catch (e) { return Actions.toast('Could not load image'); }
    }
    showLightbox(url);
  };

  const showLightbox = (src) => {
    const lb = el('div', {
      style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,.95)',
               zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'zoom-out' },
      onClick: () => lb.remove(),
    }, el('img', { src, style: { maxWidth: '95vw', maxHeight: '95vh', objectFit: 'contain' } }));
    document.body.appendChild(lb);
  };

  return { pickImage, showImage, showLightbox };
})();


/* ─── 11. REMINDERS ────────────────────────────────────────────────────── */

const Reminders = (() => {
  const timers = [];

  const requestPerm = () => {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') Notification.requestPermission();
  };

  const fire = (item, minutesBefore) => {
    if (Notification.permission !== 'granted') {
      Actions.toast(`⏰ ${item.content} — in ${minutesBefore} min`);
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      return;
    }
    try {
      new Notification('LifeOS', {
        body: `${item.content} — in ${minutesBefore} min`,
        icon: 'icon.svg', tag: item.id + '-' + minutesBefore,
        requireInteraction: true,
      });
    } catch (e) { console.warn('Notification:', e); }
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  };

  const scheduleOne = item => {
    if (!item.remStart || !item.date || !item.time || item.completed) return;
    const [h, m] = item.time.split(':').map(Number);
    const at = parseDs(item.date); at.setHours(h, m, 0, 0);
    const eventMs = at.getTime();
    const count = item.remEvery ? item.remTimes : 1;
    for (let k = 0; k < count; k++) {
      const minBefore = item.remStart - k * (item.remEvery || 0);
      const fireAt = eventMs - minBefore * 60000;
      const delay = fireAt - Date.now();
      if (delay > 0 && delay < 48 * 3600000) {
        timers.push(setTimeout(() => fire(item, minBefore), delay));
      }
    }
  };

  const scheduleAll = () => {
    timers.forEach(clearTimeout); timers.length = 0;
    if (!('Notification' in window) || Notification.permission !== 'granted') {
      requestPerm();
    }
    for (const it of state.items.values()) scheduleOne(it);
  };

  return { scheduleAll, requestPerm };
})();


/* ─── 12. RENDER (slot-based) ──────────────────────────────────────────── */

/* Render only slots whose signature changed. Each slot has its own DOM mount,
   so a state change to (say) the modal doesn't blow away the calendar's scroll
   position, and editing the modal textarea doesn't trigger re-renders at all
   (form values live in the DOM, only state.modal identity drives the re-render). */

const Slots = (() => {
  const last = new Map();
  const slot = (mountId, key, buildFn) => {
    const sig = key == null ? null : JSON.stringify(key);
    if (last.get(mountId) === sig) return;
    last.set(mountId, sig);
    const mount = $(mountId);
    if (!mount) return;
    if (sig == null) { mount.replaceChildren(); return; }
    const tree = buildFn();
    mount.replaceChildren(...(tree ? [tree] : []));
  };
  return { slot };
})();

let _rafQ = false;
const scheduleRender = () => {
  if (_rafQ) return;
  _rafQ = true;
  requestAnimationFrame(() => { _rafQ = false; render(); });
};
subscribe(scheduleRender);

const render = () => {
  document.documentElement.classList.toggle('dark', state.dark);
  document.documentElement.classList.toggle('light', !state.dark);

  // Main app
  Slots.slot('root', {
    s: state.status,
    v: state.view.name,
    d: state.view.date.getTime(),
    m: state.view.dayMode,
    h: state.history.length,
    iv: state.itemsVer,
  }, buildAppTree);

  // Modal
  Slots.slot('modalRoot',
    state.modal ? { mode: state.modal.mode, id: state.modal.item.id } : null,
    () => Modal());

  // Context menu
  Slots.slot('ctxRoot',
    state.ctx ? { x: state.ctx.x, y: state.ctx.y, id: state.ctx.item.id, ver: state.itemsVer } : null,
    () => ContextMenu());

  // Command palette
  Slots.slot('cmdRoot',
    state.cmd?.open ? 'open' : null,
    () => CommandPalette());

  // Settings
  Slots.slot('settingsRoot',
    state.settings?.open ? { user: state.user?.email, dark: state.dark } : null,
    () => Settings());

  // Toast (rendered to body, not a slot)
  if (state.toast) renderToast();
};

let _toastEl = null;
const renderToast = () => {
  if (_toastEl) _toastEl.remove();
  _toastEl = el('div', { class: 'toast' }, state.toast.msg);
  document.body.appendChild(_toastEl);
  requestAnimationFrame(() => _toastEl.classList.add('show'));
  setTimeout(() => { _toastEl?.remove(); _toastEl = null; }, 2400);
};

const DayTimeline = date => {
  const items   = itemsOnDate(date);
  const allDay  = items.filter(i => !i.time);
  const timed   = items.filter(i => i.time);
  const isToday = sameDay(date, today());

  const tlNode = el('div', { class: 'timeline',
    ref: scrollEl => requestAnimationFrame(() => {
      const h = isToday ? today().getHours() : 8;
      scrollEl.scrollTop = Math.max(0, h * 60 - scrollEl.clientHeight / 3);
    })},
    el('div', { class: 'timeline-inner' },
      Array.from({ length: 24 }, (_, h) =>
        el('div', { class: 'hour-row', style: { top: (h * 60) + 'px' },
          gesture: { onTap: ev => {
            const cv = tlNode.getBoundingClientRect();
            const yInRow = ev.y - cv.top + tlNode.scrollTop - h * 60;
            const min = Math.round(yInRow / 60 * 60 / 15) * 15;
            const total = h * 60 + Math.min(min, 45);
            const newDate = new Date(date);
            const item = blankItem(newDate);
            item.time = `${p2(Math.floor(total / 60))}:${p2(total % 60)}`;
            item.type = 'event';
            state.modal = { mode: 'new', item, ver: 0 }; notify();
          }}},
          el('div', { class: 'hour-lbl' }, fmtHourLabel(h)),
          el('div', { class: 'hour-line' }))),
      el('div', { class: 'timeline-events' },
        timed.map(TimelineEvent)),
      isToday && el('div', { class: 'now-line', style: {

      }}, el('div', { class: 'now-dot' }))));

  return el('div', { style: { flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 } },
    allDay.length > 0 && el('div', { class: 'tl-allday' },
      allDay.map(it => el('div', { class: 'tl-allday-pill ' + it.type,
        gesture: { onTap: () => Actions.openEdit(it.id),
                   onLongPress: ev => Actions.openCtx(ev.x, ev.y, it) }},
        it.content))),
    tlNode);
};

const TimelineEvent = item => {
  const [h, m] = item.time.split(':').map(Number);
  const startMin = h * 60 + m;
  const hasEnd0  = !!item.endTime;
  const endMin0  = hasEnd0
    ? (() => { const [eh, em] = item.endTime.split(':').map(Number); return eh*60+em; })()
    : startMin + 50;
  const dur0 = Math.max(20, endMin0 - startMin);
  const canResize = item.type === 'event';

  let blockEl, timeEl, drag = null;
  const fmt = mins => `${p2(Math.floor(mins/60))}:${p2(mins % 60)}`;
  const showTime = (s, d, end) =>
    fmtTimeShort(fmt(s)) + (end ? ' – ' + fmtTimeShort(fmt(s + d)) : '');

  const begin = kind => () => {
    drag = { kind, start: startMin, dur: dur0,
             hasEnd: hasEnd0 || kind === 'resize',
             curStart: startMin, curDur: dur0 };
    blockEl.classList.add('dragging');
  };
  const live = ({ dy }) => {
    if (!drag) return;
    const dMin = Math.round(dy / 15) * 15;
    if (drag.kind === 'move') {
      drag.curStart = Math.max(0, Math.min(1440 - drag.dur, drag.start + dMin));
      drag.curDur = drag.dur;
      blockEl.style.top = drag.curStart + 'px';
    } else {
      drag.curStart = drag.start;
      drag.curDur = Math.max(15, Math.min(1440 - drag.start, drag.dur + dMin));
      blockEl.style.height = drag.curDur + 'px';
    }
    if (timeEl) timeEl.textContent = showTime(drag.curStart, drag.curDur, drag.hasEnd);
  };
  const commit = () => {
    if (!drag) return;
    blockEl.classList.remove('dragging');
    const { curStart, curDur, hasEnd, start, dur } = drag;
    drag = null;
    if (curStart === start && curDur === dur) return;
    const updated = { ...item, time: fmt(curStart) };
    if (hasEnd) updated.endTime = fmt(curStart + curDur);
    Actions.upsertItem(updated);
    Sync.push(updated).catch(() => Actions.toast('Save failed'));
  };

  return el('div', {
    class: 'tl-event ' + item.type + (item.completed ? ' done' : ''),
    style: { top: startMin + 'px', height: dur0 + 'px', left: '0', right: '0' },
    ref: r => { blockEl = r; },
    gesture: {
      onTap: () => Actions.openEdit(item.id),
      onLongPress: ev => Actions.openCtx(ev.x, ev.y, item),
      onDragStart: begin('move'),
      onDrag: live,
      onDragEnd: commit,
    },
  },
    el('div', { class: 'tl-event-title' }, item.content),
    dur0 > 28 && el('div', { class: 'tl-event-time', ref: r => { timeEl = r; } },
      showTime(startMin, dur0, hasEnd0)),
    canResize && el('div', { class: 'tl-event-resize',
      gesture: {
        onDragStart: begin('resize'),
        onDrag: live,
        onDragEnd: commit,
      }}));
};

const MultiTimeline = date => {

  const days  = Array.from({ length: 7 }, (_, i) => addDays(start, i));

        el('div', { class: 'multi-day-name' }, DOWA[d.getDay()]),
        el('div', { class: 'multi-day-num' }, String(d.getDate()))))),
    el('div', { class: 'multi-body',
      ref: scrollEl => requestAnimationFrame(() => {
        const h = isTodayDay >= 0 ? today().getHours() : 8;
        scrollEl.scrollTop = Math.max(0, h * 60 - scrollEl.clientHeight / 3);

            el('div', { class: 'hour-lbl', style: { position: 'absolute', top: (h * 60 - 7) + 'px' } },

        // Day columns
        days.map(d => el('div', { class: 'multi-col',

                                  height: '1px', background: 'var(--sep-th)' } })),

            sortByTime(itemsOnDate(d)).filter(i => i.time).map(TimelineEvent)))))));
};

const DayLinearList = date => {
