// NAVIGATION
// ══════════════════════════════════════════════════════════════════
const nav = d => {
  if (S.calMode === 'month') { S.pivot = addMon(S.pivot, d); }
  else if (S.calMode === 'week') { S.pivot = S.sel = addDay(S.sel, d * 7); }
  else { S.pivot = S.sel = addDay(S.sel, d); }
  renderCal();
};

const goToday = () => {
  S.pivot = S.sel = today();
  renderCal();
  if (S.calMode === 'month') openDayPanel();
};

const setCalMode = mode => {
  if (mode !== 'month') S.pivot = S.sel;
  S.calMode = mode;
  document.querySelectorAll('.seg').forEach(b => b.classList.toggle('on', b.dataset.m === mode));
  if (mode !== 'month') closeDayPanel?.();
  renderCal();
};

// ══════════════════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════════════════
const openModal = (editId = null, preDate = null, preTime = null) => {
  S.editId = editId;
  const item = editId ? S.items.find(i => i.id === editId) : null;
  const date = item?.date ?? (preDate || ds(S.sel));
  $('m-title').textContent = item ? 'Edit Item' : 'New Item';
  $('m-content').value     = item?.content ?? '';
  $('m-date').value        = date;
  $('m-date2').value       = date;
  $('m-time').value        = item?.time ?? (preTime || '');
  $('m-endtime').value     = item?.endTime ?? '';
  // Restore reminder state
  const rem = item?.reminders;
  S._remOn = !!rem;
  $('rem-toggle').classList.toggle('on', !!rem);
  $('rem-body').style.display = rem ? '' : 'none';
  if (rem) {
    $('rem-start').value = rem.start ?? 30;
    $('rem-every').value = rem.every ?? 0;
    $('rem-times').value = rem.times ?? 3;
    $('rem-times').style.display = rem.every ? '' : 'none';
  }
  updateNotifBadge();
  selType(item?.type ?? (preTime ? 'event' : 'note'));
  // Restore attachment state
  ATT.current = item?.attachment ?? null;
  renderAttPrev();
  $('modal').classList.add('open');
  setTimeout(() => $('m-content').focus(), 60);
};

const closeModal = () => { $('modal').classList.remove('open'); S.editId = null; S._remOn = false; ATT.stopRec(); ATT.current = null; renderAttPrev(); };

const selType = t => {
  S.modalType = t;
  document.querySelectorAll('.topt').forEach(b => b.classList.toggle('on', b.dataset.t === t));
  const hasTime = t !== 'note';
  $('m-time-row').style.display      = hasTime ? '' : 'none';
  $('m-date-only-row').style.display = hasTime ? 'none' : '';
  $('m-endtime-wrap').style.display  = t === 'event' ? '' : 'none';
  $('m-time-lbl').textContent        = t === 'todo' ? 'Due time' : 'Start';
  $('rem-section').style.display     = hasTime ? '' : 'none';
  // sync date fields
  const d = $('m-date').value || $('m-date2').value;
  $('m-date').value = $('m-date2').value = d;
};

const toggleReminder = () => {
  S._remOn = !S._remOn;
  $('rem-toggle').classList.toggle('on', S._remOn);
  $('rem-body').style.display = S._remOn ? '' : 'none';
  if (S._remOn && Notification.permission === 'default') requestNotifPerms();
};

const onRemEveryChange = () => {
  $('rem-times').style.display = $('rem-every').value === '0' ? 'none' : '';
};

const saveModal = async () => {
  const content = $('m-content').value.trim();
  if (!content) return toast('Enter some text');
  const type    = S.modalType;
  const date    = type === 'note' ? $('m-date2').value : $('m-date').value;
  const time    = type === 'note' ? '' : $('m-time').value;
  const endTime = type === 'event' ? $('m-endtime').value : '';
  const reminders = S._remOn ? {
    start: parseInt($('rem-start').value),
    every: parseInt($('rem-every').value),
    times: parseInt($('rem-times').value),
  } : null;
  const btn = $('m-save'); btn.disabled = true;
  const attachment = ATT.current;
  if (S.editId) await editItem(S.editId, { content, type, date, time, endTime, reminders, attachment });
  else          await addItem({ content, type, date, time, endTime, reminders, attachment });
  closeModal(); btn.disabled = false;
};

// ══════════════════════════════════════════════════════════════════
// CONTEXT MENU
// ══════════════════════════════════════════════════════════════════
const showCtx = (e, id) => {
  e.preventDefault(); S.ctxId = id;
  const ctx = $('ctx');
  ctx.style.cssText = 'left:-999px;top:-999px';  // render offscreen to measure
  ctx.classList.add('open');
  const mh = ctx.offsetHeight, mw = ctx.offsetWidth;
  const x  = Math.min(e.clientX, innerWidth  - mw - 8);
  const y  = (e.clientY + mh + 8 > innerHeight)
    ? Math.max(8, e.clientY - mh)   // flip above the tap point
    : e.clientY + 4;
  ctx.style.cssText = `left:${x}px;top:${y}px`;
};
const closeCtx = () => { $('ctx').classList.remove('open'); S.ctxId = null; };
const ctxType  = t => { if (S.ctxId) changeType(S.ctxId, t); closeCtx(); };
const ctxEdit  = () => { if (S.ctxId) openModal(S.ctxId); closeCtx(); };
const ctxDel   = () => { if (S.ctxId && confirm('Delete this item?')) deleteItem(S.ctxId); closeCtx(); };

  S.view = v;

  $('v-list').classList.toggle('on', v === 'list');
  $('nb-cal').classList.toggle('on',  v === 'cal');
  $('nb-list').classList.toggle('on', v === 'list');

  if (v === 'list') renderList(); else renderCal();

const setFilter = f => { S.filter = f; renderList(); };

// ══════════════════════════════════════════════════════════════════
// SWIPE-TO-DISMISS (bottom sheets)
// ══════════════════════════════════════════════════════════════════
const initSwipe = (el, dismiss) => {
  if (!el) return;
  const handle = el.querySelector('.dp-handle-wrap') || el.querySelector('.m-handle-wrap') || el;
  let t0, y0, yN, active = false;

  handle.addEventListener('touchstart', e => {
    t0 = Date.now(); y0 = yN = e.touches[0].clientY; active = true;
    el.style.transition = 'none';
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!active) return;
    yN = e.touches[0].clientY;
    const dy = Math.max(0, yN - y0);
    el.style.transform = `translateY(${dy}px)`;
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (!active) return; active = false;
    el.style.transition = '';
    const dy = yN - y0, vel = dy / (Date.now() - t0);
    if (dy > 120 || vel > 0.5) {
      el.style.transform = 'translateY(100%)';
      setTimeout(() => { el.style.transform = ''; dismiss(); }, 320);
    } else {
      el.style.transform = '';
    }
  }, { passive: true });
};

// ══════════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════════
const toast    = msg => { const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); };
const showLoad = msg => { $('loading').style.display='flex'; $('load-msg').textContent=msg; };
const hideLoad = ()  => { $('loading').style.display='none'; };

// ── DARK MODE ─────────────────────────────────────────────────────────────
const applyTheme = () => {
  document.documentElement.classList.toggle('dark',  S.dark);
  document.documentElement.classList.toggle('light', !S.dark);
  const sw = $('dm-switch'); if (sw) sw.classList.toggle('on', S.dark);
  localStorage.setItem('lo_dark', S.dark);
  // Update theme-color meta
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content', S.dark ? '#1c2235' : '#e4e7f0');
};
const toggleDarkMode = () => { S.dark = !S.dark; applyTheme(); };

// ── SETTINGS PANEL ────────────────────────────────────────────────────────
const openSettings = () => {
  $('set-overlay').classList.add('open');
  $('set-sheet').classList.add('open');
  $('dm-switch').classList.toggle('on', S.dark);
  if (S.sheetId) $('sheets-link').href = `https://docs.google.com/spreadsheets/d/${S.sheetId}`;
};
const closeSettings = () => {
  $('set-overlay').classList.remove('open');
  $('set-sheet').classList.remove('open');
};
const signOut = () => {
  if (!confirm('Sign out? Your data stays in Google Sheets.')) return;
  closeSettings();
  S.token = null; S.tokenExp = 0; S.items = [];
  localStorage.removeItem('lo_cache');
  $('app').classList.remove('on');
  $('auth').style.display = '';
};

// ── USER PROFILE ──────────────────────────────────────────────────────────
const fetchUserInfo = async () => {
  if (!S.token) return;
  try {
    const u = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${S.token}` }
    }).then(r => r.json());
    S.user = u;
    // Header avatar
    const hdr = $('hdr-avatar');
    if (u.picture) {
      hdr.innerHTML = `<img src="${u.picture}" alt="">`;
    } else {
      const init = (u.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      hdr.textContent = init;
    }
    // Settings panel
    if (u.picture) {
      $('set-avatar').innerHTML = `<img src="${u.picture}" alt="">`;
    } else {
      const init = (u.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      $('set-initials').textContent = init;
    }
    $('set-name').textContent  = u.name  || '—';
    $('set-email').textContent = u.email || '—';
  } catch(_) {}
};


// ══════════════════════════════════════════════════════════════════
// ATTACHMENTS — image capture + voice recording
// ══════════════════════════════════════════════════════════════════
const fmtDur = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

// ATT: the attachment module — all state lives here, not in S
const ATT = (() => {
  let current  = null;  // {type:'image',data:'...'} | {type:'audio',id:'...',dur:N} | null
  let mediaRec = null, chunks = [], timer = null, secs = 0;

  // ── Image ─────────────────────────────────────────────────────────
  const pickImage = () => $('img-picker').click();

  const handleImagePick = async input => {
    const file = input.files[0]; if (!file) return;
    input.value = '';
    setStatus('Compressing…');
    try {
      const { full, thumb } = await compress(file);
      setStatus('Uploading…');
      if (!await ensureToken()) { setStatus(''); return; }
      const id = await uploadDrive(full, `photo-${Date.now()}.jpg`, 'image/jpeg');
      current = { type: 'image', id, thumb };
      renderAttPrev();
    } catch(e) { toast('Image error: ' + e.message); setStatus(''); }
  };

  // Returns {full: Blob for Drive, thumb: base64 tiny for Sheets}
  const compress = file => new Promise((ok, fail) => {
    const url = URL.createObjectURL(file);
    const img  = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const draw = (maxPx, q) => {
        const r = Math.min(maxPx / img.width, maxPx / img.height, 1);
        const cv = document.createElement('canvas');
        cv.width = Math.round(img.width * r); cv.height = Math.round(img.height * r);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        return cv;
      };
      // Full image → Drive upload as Blob
      draw(1200, 0).toBlob(blob => {
        // Tiny thumbnail → base64 for Sheets cell (≈2-4KB)
        const thumb = draw(120, 0).toDataURL('image/jpeg', 0.5);
        ok({ full: blob, thumb });
      }, 'image/jpeg', 0.8);
    };
    img.onerror = fail;
    img.src = url;
  });

  // ── Audio ─────────────────────────────────────────────────────────
  const toggleRec = async () => {
    if (mediaRec && mediaRec.state === 'recording') { stopRec(); return; }
    await startRec();
  };

  const startRec = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus' : 'audio/webm';
      mediaRec = new MediaRecorder(stream, { mimeType: mime });
      mediaRec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
      mediaRec.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, { type: mime });
        await finalizeAudio(blob);
      };
      mediaRec.start(200);
      secs = 0;
      $('att-mic-btn').classList.add('recording');
      timer = setInterval(() => {
        secs++;
        setStatus('⏺ ' + fmtDur(secs));
        if (secs >= 120) stopRec(); // 2-min cap
      }, 1000);
    } catch(e) { toast('Microphone unavailable: ' + e.message); }
  };

  const stopRec = () => {
    clearInterval(timer); timer = null;
    $('att-mic-btn').classList.remove('recording');
    setStatus('Uploading…');
    if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
  };

  const finalizeAudio = async blob => {
    try {
      if (!await ensureToken()) { setStatus(''); return; }
      const id = await uploadDrive(blob, `voice-${Date.now()}.webm`, blob.type);
      current = { type: 'audio', id, dur: secs };
      renderAttPrev();
    } catch(e) { toast('Audio upload failed: ' + e.message); setStatus(''); }
  };

  const uploadDrive = async (blob, name, mime) => {
    const meta = JSON.stringify({ name, mimeType: mime });
    const form = new FormData();
    form.append('metadata', new Blob([meta], { type: 'application/json' }));
    form.append('file', blob);
    const r = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      { method: 'POST', headers: { Authorization: `Bearer ${S.token}` }, body: form }
    );
    if (!r.ok) throw new Error(await r.text());
    return (await r.json()).id;
  };

  // ── Preview inside modal ───────────────────────────────────────────
  const renderAttPrev = () => {
    const el = $('m-att-preview'); if (!el) return;
    setStatus('');
    if (!current) { el.style.display = 'none'; el.innerHTML = ''; return; }
    el.style.display = '';
    if (current.type === 'image') {
      el.innerHTML = `<div class="att-img-wrap">
        <img class="att-img" src="${current.thumb}" onclick="showLightbox('${current.id}')">
        <button class="att-del" onclick="ATT.clear()" title="Remove">✕</button>
      </div>`;
    } else {
      el.innerHTML = `<div class="att-audio-chip">
        🎤 &nbsp;<span style="font-family:monospace">${fmtDur(current.dur)}</span>
        <button class="att-inline-del" onclick="ATT.clear()">✕</button>
      </div>`;
    }
  };

  const setStatus = msg => { const el = $('att-status'); if (el) el.textContent = msg; };
  const clear  = () => { current = null; renderAttPrev(); };
  const getCurrent = () => current;
  const setCurrent = v => { current = v; };

  return { pickImage, handleImagePick, toggleRec, stopRec, clear, getCurrent, setCurrent,
           renderAttPrev: renderAttPrev, get current() { return current; }, set current(v) { current = v; } };
})();

// Expose top-level for onclick attributes
const pickImage      = () => ATT.pickImage();
const handleImagePick= el  => ATT.handleImagePick(el);
const toggleRecording= ()  => ATT.toggleRec();
const renderAttPrev  = ()  => ATT.renderAttPrev();

// ── Lightbox ───────────────────────────────────────────────────────────────
const showLightbox = async driveId => {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.onclick = () => lb.remove();
  lb.innerHTML = `<div style="color:#fff;font-family:monospace;font-size:12px">Loading…</div>`;
  document.body.appendChild(lb);
  try {
    if (!await ensureToken()) { lb.remove(); return; }
    if (!_audioCache[driveId]) {
      const r = await fetch(
        `https://www.googleapis.com/drive/v3/files/${driveId}?alt=media`,
        { headers: { Authorization: `Bearer ${S.token}` } }
      );
      if (!r.ok) throw new Error(r.status);
      _audioCache[driveId] = URL.createObjectURL(await r.blob());
    }
    lb.innerHTML = `<img src="${_audioCache[driveId]}" alt="">`;
  } catch(e) { lb.remove(); toast('Could not load image'); }
};

// ── Audio playback in item rows ─────────────────────────────────────────────
const _audioCache = {};
const playAudio = async btn => {
  if (btn.classList.contains('loading')) return;
  const id  = btn.dataset.audio;
  const dur = btn.dataset.dur || 0;
  if (!id) return;

  // If currently playing, pause
  if (btn._audio && !btn._audio.paused) {
    btn._audio.pause(); btn.textContent = `▶ ${fmtDur(dur)}`; return;
  }

  btn.classList.add('loading'); btn.textContent = '…';
  try {
    if (!await ensureToken()) { btn.classList.remove('loading'); btn.textContent = `▶ ${fmtDur(dur)}`; return; }
    if (!_audioCache[id]) {
      const r = await fetch(
        `https://www.googleapis.com/drive/v3/files/${id}?alt=media`,
        { headers: { Authorization: `Bearer ${S.token}` } }
      );
      if (!r.ok) throw new Error(r.status);
      _audioCache[id] = URL.createObjectURL(await r.blob());
    }
    const audio = new Audio(_audioCache[id]);
    btn._audio = audio;
    btn.classList.remove('loading');
    audio.play();
    btn.textContent = '⏸ ' + fmtDur(dur);
    audio.onended = () => { btn.textContent = `▶ ${fmtDur(dur)}`; };
  } catch(e) { btn.classList.remove('loading'); btn.textContent = `▶ ${fmtDur(dur)}`; toast('Playback failed'); }
};

// ══════════════════════════════════════════════════════════════════
// EVENT WIRING — event delegation for dynamically rendered HTML
// ══════════════════════════════════════════════════════════════════
document.addEventListener('click', e => {
  // Hour slot tap (day view) → open modal with time pre-filled
  const hourRow = e.target.closest('.hour-row');
  if (hourRow && (S.calMode === 'day' || S.calMode === 'week') && !e.target.closest('.timed-block') && !e.target.closest('[data-toggle]')) {
    const hour      = parseInt(hourRow.dataset.hour);
    const clickDate = hourRow.dataset.day ? parseDs(hourRow.dataset.day) : S.sel;
    if (hourRow.dataset.day) S.sel = clickDate;
    const rect  = hourRow.getBoundingClientRect();
    const snap  = Math.floor((e.clientY - rect.top) / HOUR_H * 4) * 15;
    const total = hour * 60 + Math.min(snap, 45);
    openModal(null, ds(clickDate), `${p2(Math.floor(total/60))}:${p2(total%60)}`);
    return;
  }
  // Timed block tap → edit
  const block = e.target.closest('.timed-block[data-id]');
  if (block && !e.target.closest('[data-toggle]')) { openModal(block.dataset.id); return; }
  // All-day chip tap → edit
  const chip = e.target.closest('.allday-chip[data-id]');
  if (chip && !e.target.closest('[data-toggle]')) { openModal(chip.dataset.id); return; }
  // Day cell (month grid)
  const dayCell = e.target.closest('[data-day]');
  if (dayCell && !e.target.closest('[data-toggle]') && !e.target.closest('[data-badge]')) {
    const d = parseDs(dayCell.dataset.day);
    S.sel = d;
    if (S.calMode === 'month') { renderCal(); openDayPanel(); }
    else { S.pivot = d; renderCal(); }
    return;
  }
  // Week day strip
  if (e.target.closest('.wk-day') && !e.target.closest('[data-toggle]')) {
    const d = parseDs(e.target.closest('.wk-day').dataset.day);
    S.sel = d; renderCal(); return;
  }
  // Checkbox toggle
  const cbEl = e.target.closest('[data-toggle]');
  if (cbEl) { toggleDone(cbEl.dataset.toggle); return; }
  // Type badge → context menu
  const badgeEl = e.target.closest('[data-badge]');
  if (badgeEl) { showCtx(e, badgeEl.dataset.badge); return; }
  // Close context menu
  if (!e.target.closest('#ctx')) closeCtx();
});

// Double-tap to edit (works on item-rows, timed-blocks, allday-chips)
document.addEventListener('dblclick', e => {
  const el = e.target.closest('[data-id]');
  if (el && !e.target.closest('#ctx')) openModal(el.dataset.id);
});

// Context menu via right-click — works on any item
document.addEventListener('contextmenu', e => {
  const el = e.target.closest('[data-id]');
  if (el) showCtx(e, el.dataset.id);
});

// Long-press on any item → context menu
let lpTimer = null;
document.addEventListener('touchstart', e => {
  const el = e.target.closest('[data-id]');
  if (!el) return;
  lpTimer = setTimeout(() => { lpTimer = null; showCtx(e.touches[0], el.dataset.id); }, 600);
}, { passive: true });
document.addEventListener('touchend',  () => clearTimeout(lpTimer), { passive: true });
document.addEventListener('touchmove', () => clearTimeout(lpTimer), { passive: true });

// Modal: overlay click, keyboard, swipe
$('modal').addEventListener('click',    e => { if (e.target === $('modal')) closeModal(); });
$('m-content').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveModal();
  if (e.key === 'Escape') closeModal();
});
initSwipe($('modal-inner'), closeModal);

// Header desktop tabs
$('hdr-tabs').innerHTML = `
  <button class="htab on" data-v="cal"  onclick="switchView('cal')">Calendar</button>
  <button class="htab"    data-v="list" onclick="switchView('list')">List</button>`;

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
hydrate();
applyTheme(); // apply saved dark/light preference immediately

if (S.sheetId) {
  // Returning user: show cached data instantly, then silently re-auth in background
  restore();
  if (S.items.length) {
    $('auth').style.display = 'none';
    $('app').classList.add('on');
    render();
  }
  // Only attempt silent auto-login for users with prior auth (sheetId stored)
  // First-timers just see the button — this avoids poisoning the consent popup flow
  whenGIS(() => autoLogin());
}
// else: first-time user — auth screen is visible, button click calls startAuth() directly

// Keep the current-time line moving in day and week view
setInterval(() => {
  const y = ((today().getHours() + today().getMinutes()/60) * HOUR_H) + 'px';
  const nl  = $('now-line');      if (nl)  nl.style.top  = y;
  const wnl = $('week-now-line'); if (wnl) wnl.style.top = y;
}, 60000);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// Global keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); openModal(); }
  if (e.key === 'Escape') { closeModal(); closeCtx(); closeSettings(); }
});
</script>
