<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c2235">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LifeOS">
<title>LifeOS</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
/* ─── VS CODE HIGH CONTRAST ─────────────────────────────────────────────────
   Colors taken directly from VS Code's High Contrast Dark token theme.
   #6FC3DF = contrastBorder  #F38518 = contrastActiveBorder
   #DCDCAA = variable.name   #4EC9B0 = type.name
   #C586C0 = keyword         #4FC1FF = interface / link
   #6A9955 = comment/done    #CE9178 = string                                */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #000000;
  --bg1:    #0a0a0a;
  --bg2:    #141414;
  --bg3:    #1e1e1e;
  --bd:     #6FC3DF;          /* VS Code contrastBorder */
  --bd-lo:  rgba(111,195,223,.25);   /* subtle dividers */
  --bd-hi:  #ffffff;          /* maximum-contrast borders */
  --focus:  #F38518;          /* VS Code contrastActiveBorder */
  --acc:    #4FC1FF;          /* VS Code interface color */
  --acc-bg: rgba(79,193,255,.08);
  --note:   #DCDCAA;  --note-bg:  rgba(220,220,170,.08);
  --todo:   #4EC9B0;  --todo-bg:  rgba(78,201,176,.08);
  --event:  #C586C0;  --event-bg: rgba(197,134,192,.08);
  --done:   #6A9955;  --done-bg:  rgba(106,153,85,.08);
  --red:    #F44747;
  --t1: #CCCCCC;   /* VS Code editor.foreground */
  --t2: #858585;   /* VS Code tab.inactiveForeground */
  --t3: #3A3A3A;
  --hdr-h: 35px;
  --nav-h: 52px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --r: 0px;
}

/* Light mode — VS Code Light High Contrast */
html.light {
  --bg: #ffffff; --bg1: #f3f3f3; --bg2: #e8e8e8; --bg3: #d0d0d0;
  --bd: #292929; --bd-lo: rgba(41,41,41,.3); --bd-hi: #000000;
  --focus: #B45F04; --acc: #0078D4; --acc-bg: rgba(0,120,212,.07);
  --note: #795E26; --note-bg: rgba(121,94,38,.07);
  --todo: #267F99; --todo-bg: rgba(38,127,153,.07);
  --event: #AF00DB; --event-bg: rgba(175,0,219,.07);
  --done: #107C10; --done-bg: rgba(16,124,16,.07);
  --red: #CD3131;
  --t1: #000000; --t2: #6F6F6F; --t3: #BBBBBB;
}
html { color-scheme: dark; } html.light { color-scheme: light; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--t1); font-size: 13px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
  overflow: hidden; height: 100dvh;
}

/* ── AUTH ────────────────────────────────────────────────────────────────── */
#auth { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg); }
.auth-card { background: var(--bg1); border: 1px solid var(--bd); padding: 36px; width: 100%; max-width: 360px; }
.auth-logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
.auth-name { font-size: 20px; font-weight: 700; text-align: center; color: var(--acc); margin-bottom: 4px; letter-spacing: -.2px; }
.auth-sub  { font-size: 12px; color: var(--t2); text-align: center; margin-bottom: 24px; }
.gsi-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 9px 16px; border: 1px solid var(--bd); background: var(--bg2); color: var(--t1); font-size: 13px; font-weight: 600; cursor: pointer; transition: background .1s; }
.gsi-btn:hover  { background: var(--bg3); color: #fff; }
.gsi-btn:active { opacity: .8; }
.gsi-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.auth-hint { font-size: 11px; color: var(--t3); line-height: 1.8; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--bd-lo); }
.auth-hint a { color: var(--acc); text-decoration: none; }
.auth-hint code { font-family: 'Cascadia Code', 'Consolas', monospace; background: var(--bg2); padding: 0 4px; }

/* ── LOADING ─────────────────────────────────────────────────────────────── */
#loading { display: none; position: fixed; inset: 0; background: var(--bg); align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 999; }
.spin { width: 24px; height: 24px; border: 2px solid var(--bd-lo); border-top-color: var(--acc); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#load-msg { font-size: 12px; color: var(--t2); font-family: monospace; }

/* ── APP ─────────────────────────────────────────────────────────────────── */
#app { display: none; height: 100dvh; flex-direction: column; overflow: hidden; }
#app.on { display: flex; }

/* ── HEADER — VS Code title bar style ───────────────────────────────────── */
.hdr { height: var(--hdr-h); flex-shrink: 0; background: var(--bg1); border-bottom: 1px solid var(--bd); display: flex; align-items: center; padding: 0 8px; gap: 6px; z-index: 20; }
.hdr-wordmark { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.hdr-logo-icon { width: 18px; height: 18px; flex-shrink: 0; background: var(--acc); display: flex; align-items: center; justify-content: center; font-size: 11px; }
.hdr-wordmark-text { font-size: 13px; font-weight: 600; color: var(--t2); }
.hdr-tabs { display: flex; gap: 0; height: 100%; align-items: stretch; }
.htab { padding: 0 12px; border: none; border-bottom: 1px solid transparent; background: transparent; font-size: 12px; font-weight: 500; color: var(--t2); cursor: pointer; transition: all .1s; white-space: nowrap; }
.htab:hover { color: var(--t1); background: var(--bg2); }
.htab.on { color: var(--t1); border-bottom-color: var(--acc); background: var(--bg); }
.hdr-actions { display: flex; align-items: center; gap: 4px; }
.hdr-new-btn { padding: 3px 10px; border: 1px solid var(--bd); background: var(--acc); color: #000; font-size: 12px; font-weight: 700; cursor: pointer; transition: filter .1s; white-space: nowrap; }
.hdr-new-btn:hover { filter: brightness(1.15); }
@media (max-width: 767px) { .hdr-new-btn { display: none; } }
.icon-btn { width: 28px; height: 28px; border: 1px solid transparent; background: transparent; color: var(--t2); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .1s; }
.icon-btn:hover { border-color: var(--bd); color: var(--t1); background: var(--bg2); }
.icon-btn.go { animation: spin .9s linear infinite; }
.avatar-btn { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--bd); overflow: hidden; background: var(--bg2); color: var(--acc); font-size: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color .1s; }
.avatar-btn img { width: 100%; height: 100%; object-fit: cover; }
.avatar-btn:hover { border-color: var(--focus); }
@media (max-width: 767px) { .avatar-btn { display: none; } }

/* ── SEGMENTED CONTROL — VS Code editor tab style ────────────────────────── */
.seg-wrap { flex-shrink: 0; background: var(--bg1); border-bottom: 1px solid var(--bd); }
.seg-ctrl { display: flex; overflow-x: auto; scrollbar-width: none; }
.seg-ctrl::-webkit-scrollbar { display: none; }
.seg { padding: 6px 16px; border: none; border-bottom: 1px solid transparent; background: var(--bg2); font-size: 12px; font-weight: 500; color: var(--t2); cursor: pointer; white-space: nowrap; transition: all .1s; border-right: 1px solid var(--bd-lo); flex-shrink: 0; }
.seg:hover { color: var(--t1); background: var(--bg3); }
.seg.on { color: var(--t1); background: var(--bg); border-bottom-color: var(--acc); }

/* ── LAYOUT ──────────────────────────────────────────────────────────────── */
.body { flex: 1; overflow: hidden; display: flex; position: relative; }
.view { display: none; width: 100%; height: 100%; flex-direction: column; overflow: hidden; }
.view.on { display: flex; }

/* ── CAL NAV ─────────────────────────────────────────────────────────────── */
.cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; flex-shrink: 0; border-bottom: 1px solid var(--bd-lo); }
.cal-nav-lbl  { font-size: 13px; font-weight: 700; color: var(--t1); }
.cal-nav-side { display: flex; align-items: center; gap: 2px; }
.nav-arrow  { width: 24px; height: 24px; border: 1px solid transparent; background: transparent; color: var(--t2); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .1s; }
.nav-arrow:hover { border-color: var(--bd); color: var(--t1); background: var(--bg2); }
.today-pill { font-size: 11px; font-weight: 600; color: var(--acc); border: 1px solid var(--acc); background: transparent; padding: 2px 8px; cursor: pointer; transition: all .1s; }
.today-pill:hover { background: var(--acc-bg); }

/* ── MONTH GRID ── sharp gridlines like a spreadsheet ───────────────────── */
.weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--bd); background: var(--bg1); flex-shrink: 0; }
.wday-lbl { text-align: center; font-size: 10px; font-weight: 700; color: var(--t2); padding: 4px 0; letter-spacing: .6px; text-transform: uppercase; border-right: 1px solid var(--bd-lo); }
.wday-lbl:last-child { border-right: none; }
.month-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(6, 1fr); flex: 1; min-height: 0; border-left: 1px solid var(--bd); border-top: 1px solid var(--bd); }
.day-cell { border-right: 1px solid var(--bd-lo); border-bottom: 1px solid var(--bd-lo); padding: 4px 4px 3px; cursor: pointer; display: flex; flex-direction: column; align-items: stretch; min-height: 0; overflow: hidden; transition: background .08s; }
.day-cell:hover  { background: var(--bg2); }
.day-cell.sel    { background: var(--acc-bg); outline: 2px solid var(--acc); outline-offset: -2px; z-index: 1; }
.day-cell:active { background: var(--bg3); }
.day-cell.other  { opacity: .25; }
.day-n { width: 20px; height: 20px; font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; color: var(--t2); flex-shrink: 0; align-self: flex-start; }
.day-cell.today .day-n { background: var(--acc); color: #000; font-weight: 800; }
.day-dots { display: flex; gap: 3px; padding: 2px 0 0; flex-wrap: wrap; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.dot.note  { background: var(--note); }
.dot.todo  { background: var(--todo); }
.dot.event { background: var(--event); }
.dot.done  { background: var(--done); }
.day-chip { font-size: 10px; padding: 0 4px; line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; border-left: 2px solid; }
.day-chip.note  { background: var(--note-bg);  color: var(--note);  border-left-color: var(--note); }
.day-chip.todo  { background: var(--todo-bg);  color: var(--todo);  border-left-color: var(--todo); }
.day-chip.event { background: var(--event-bg); color: var(--event); border-left-color: var(--event); }
.day-chip.done  { opacity: .4; text-decoration: line-through; border-left-color: var(--done); }
.day-chip.more  { color: var(--t3); background: transparent; border-left-color: transparent; }
@media (max-width: 767px) { .day-chip { display: none; } }
@media (min-width: 768px)  { .day-dots { display: none; } }

/* ── MONTH VIEW LAYOUT ───────────────────────────────────────────────────── */
@media (max-width: 767px) {
  .cal-wrap  { position: relative; flex: 1; overflow: hidden; }
  .day-panel { position: absolute; bottom: 0; left: 0; right: 0; max-height: 60vh; border-top: 1px solid var(--bd); background: var(--bg1); box-shadow: 0 -2px 16px rgba(0,0,0,.8); transform: translateY(100%); transition: transform .26s cubic-bezier(.4,0,.2,1); will-change: transform; touch-action: none; }
  .day-panel.open { transform: translateY(0); }
}
@media (min-width: 768px) {
  .cal-wrap  { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .cal-left  { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-width: 0; }
  .day-panel { height: 220px; flex-shrink: 0; border-top: 1px solid var(--bd); background: var(--bg1); }
  .dp-handle { display: none; } .dp-close { display: none; }
}
@media (min-width: 1100px) { .day-panel { height: 260px; } }

.dp-handle-wrap { display: flex; justify-content: center; padding: 6px 0 2px; cursor: pointer; }
.dp-handle { width: 28px; height: 2px; background: var(--bd); }
.dp-hdr    { display: flex; align-items: center; padding: 5px 12px 6px; gap: 8px; flex-shrink: 0; border-bottom: 1px solid var(--bd-lo); }
.dp-date   { font-size: 11px; font-weight: 700; flex: 1; color: var(--acc); text-transform: uppercase; letter-spacing: .6px; }
.dp-close  { width: 20px; height: 20px; border: 1px solid var(--bd); background: transparent; color: var(--t2); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.dp-items  { flex: 1; overflow-y: auto; }

/* ── WEEK TIME-GRID ──────────────────────────────────────────────────────── */
.week-view   { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.week-hdr    { display: flex; flex-shrink: 0; border-bottom: 1px solid var(--bd); background: var(--bg1); }
.week-gutter { width: 44px; flex-shrink: 0; border-right: 1px solid var(--bd-lo); }
.wk-col-hdr  { flex: 1; text-align: center; padding: 5px 2px 4px; cursor: pointer; border-left: 1px solid var(--bd-lo); transition: background .08s; }
.wk-col-hdr:first-of-type { border-left: none; }
.wk-col-hdr:hover { background: var(--bg2); }
.wk-hdr-name { font-size: 9px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: .5px; }
.wk-hdr-num  { width: 22px; height: 22px; font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; margin: 1px auto 0; color: var(--t1); }
.wk-col-hdr.today .wk-hdr-num { background: var(--acc); color: #000; font-weight: 800; }
.week-allday        { display: flex; flex-shrink: 0; border-bottom: 1px solid var(--bd); min-height: 24px; background: var(--bg1); }
.week-allday-gutter { width: 44px; flex-shrink: 0; font-size: 9px; color: var(--t3); text-align: right; padding: 5px 4px 0 0; text-transform: uppercase; letter-spacing: .3px; border-right: 1px solid var(--bd-lo); }
.wk-allday-col      { flex: 1; padding: 2px 2px; display: flex; flex-direction: column; gap: 1px; border-left: 1px solid var(--bd-lo); min-width: 0; }
.wk-allday-col:first-of-type { border-left: none; }
.wk-allday-chip     { font-size: 10px; padding: 0 4px; border-left: 2px solid; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wk-allday-chip.note  { background: var(--note-bg);  color: var(--note);  border-left-color: var(--note); }
.wk-allday-chip.todo  { background: var(--todo-bg);  color: var(--todo);  border-left-color: var(--todo); }
.wk-allday-chip.event { background: var(--event-bg); color: var(--event); border-left-color: var(--event); }
.wk-allday-chip.done  { opacity: .4; text-decoration: line-through; }
.week-body  { flex: 1; overflow-y: auto; display: flex; }
.week-times { width: 44px; flex-shrink: 0; position: relative; height: calc(24*64px); pointer-events: none; border-right: 1px solid var(--bd-lo); }
.wk-time-lbl { position: absolute; right: 4px; font-size: 9px; color: var(--t3); margin-top: -6px; font-variant-numeric: tabular-nums; font-family: monospace; }
.week-grid   { flex: 1; display: flex; position: relative; height: calc(24*64px); }
.wk-hline    { position: absolute; left: 0; right: 0; height: 1px; background: var(--bd-lo); pointer-events: none; }
.wk-half     { position: absolute; left: 0; right: 0; height: 1px; background: rgba(255,255,255,.03); pointer-events: none; }
.wk-col      { flex: 1; position: relative; border-left: 1px solid var(--bd-lo); min-width: 0; }
.wk-col:first-child { border-left: none; }
.wk-col .hour-row    { position: absolute; left: 0; right: 0; height: 64px; cursor: pointer; }
.wk-col .hour-row:hover { background: var(--acc-bg); }
.wk-col .timed-layer { position: absolute; top: 0; left: 1px; right: 1px; pointer-events: none; }
.wk-col .timed-block { left: 0; right: 0; }
.week-now-line { position: absolute; left: 0; right: 0; height: 1px; background: var(--red); pointer-events: none; z-index: 5; }
.week-now-dot  { position: absolute; left: -3px; top: -3px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── DAY TIME GRID ───────────────────────────────────────────────────────── */
.day-view-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.allday-bar    { display: flex; align-items: flex-start; border-bottom: 1px solid var(--bd); background: var(--bg1); flex-shrink: 0; min-height: 32px; }
.allday-lbl    { width: 44px; flex-shrink: 0; font-size: 9px; font-weight: 700; color: var(--t3); text-align: right; padding: 7px 5px 0 0; text-transform: uppercase; letter-spacing: .4px; border-right: 1px solid var(--bd-lo); }
.allday-chips  { display: flex; flex-wrap: wrap; gap: 3px; flex: 1; padding: 4px 7px; }
.allday-chip   { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 1px 7px; border-left: 2px solid; cursor: pointer; }
.allday-chip.note  { background: var(--note-bg);  color: var(--note);  border-left-color: var(--note); }
.allday-chip.todo  { background: var(--todo-bg);  color: var(--todo);  border-left-color: var(--todo); }
.allday-chip.event { background: var(--event-bg); color: var(--event); border-left-color: var(--event); }
.allday-chip.done .allday-text { text-decoration: line-through; opacity: .5; }
.allday-cb { width: 12px; height: 12px; border-radius: 50%; border: 1px solid currentColor; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.allday-cb.on { background: var(--done); border-color: var(--done); }
.allday-cb.on::after { content: '✓'; color: #000; font-size: 8px; font-weight: 700; }
.time-grid  { flex: 1; overflow-y: auto; position: relative; }
.time-inner { position: relative; height: calc(24*64px); }
.hour-row   { position: absolute; left: 0; right: 0; height: 64px; display: flex; align-items: flex-start; cursor: pointer; }
.hour-row:hover { background: var(--acc-bg); }
.hour-lbl   { width: 44px; flex-shrink: 0; font-size: 9px; color: var(--t3); text-align: right; padding: 0 6px 0 0; margin-top: -6px; user-select: none; pointer-events: none; border-right: 1px solid var(--bd-lo); font-variant-numeric: tabular-nums; font-family: monospace; }
.hour-line  { flex: 1; border-top: 1px solid var(--bd-lo); pointer-events: none; }
.half-line  { position: absolute; top: 32px; left: 44px; right: 0; border-top: 1px solid rgba(255,255,255,.03); pointer-events: none; }
.timed-layer { position: absolute; top: 0; left: 44px; right: 4px; pointer-events: none; }
.timed-block { position: absolute; padding: 3px 6px; font-size: 11px; line-height: 1.3; pointer-events: all; cursor: pointer; overflow: hidden; box-sizing: border-box; border-left: 3px solid; transition: filter .1s; }
.timed-block:hover  { filter: brightness(1.3); }
.timed-block:active { filter: brightness(.8); }
.timed-block.note  { background: var(--note-bg);  border-left-color: var(--note);  color: var(--note); }
.timed-block.todo  { background: var(--todo-bg);  border-left-color: var(--todo);  color: var(--todo); }
.timed-block.event { background: var(--event-bg); border-left-color: var(--event); color: var(--event); }
.timed-block.done  { opacity: .3; }
.timed-block .tb-row   { display: flex; align-items: center; gap: 4px; }
.timed-block .tb-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.timed-block .tb-time  { font-size: 9px; opacity: .7; margin-top: 2px; font-family: monospace; }
.timed-block .tb-dur   { font-size: 9px; opacity: .55; margin-top: 1px; font-family: monospace; }
.timed-block .tb-cb    { width: 12px; height: 12px; border-radius: 50%; border: 1px solid currentColor; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.timed-block.done .tb-cb { background: currentColor; }
.timed-block.done .tb-cb::after { content: '✓'; color: #000; font-size: 8px; }
.now-line { position: absolute; left: 36px; right: 0; height: 1px; background: var(--red); pointer-events: none; z-index: 5; }
.now-dot  { position: absolute; left: -3px; top: -3px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: pulse 2s ease-in-out infinite; }
@keyframes ghostin { from{opacity:0}to{opacity:1} }
.slot-ghost { position: absolute; left: 44px; right: 4px; height: 40px; background: var(--acc-bg); pointer-events: none; border: 1px dashed var(--acc); display: flex; align-items: center; padding: 0 7px; font-size: 11px; color: var(--acc); animation: ghostin .1s; }

/* ── ITEM ROWS ───────────────────────────────────────────────────────────── */
.items-scroll   { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav-h)+12px+var(--safe-b)); }
.item-group-hdr { font-size: 10px; font-weight: 700; color: var(--t2); padding: 8px 12px 3px; position: sticky; top: 0; background: var(--bg); z-index: 1; text-transform: uppercase; letter-spacing: .7px; border-bottom: 1px solid var(--bd-lo); }
.items-inset    { overflow: hidden; border-bottom: 1px solid var(--bd-lo); }
.item-row       { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; cursor: default; transition: background .08s; border-bottom: 1px solid var(--bd-lo); }
.item-row:last-child { border-bottom: none; }
.item-row:hover { background: var(--bg2); }
.item-row.done .item-text { text-decoration: line-through; color: var(--t3); }
.item-icon { font-size: 12px; width: 16px; text-align: center; flex-shrink: 0; padding-top: 2px; color: var(--t3); }
.item-cb   { width: 15px; height: 15px; border-radius: 50%; border: 1px solid var(--t2); flex-shrink: 0; cursor: pointer; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all .1s; }
.item-cb:hover { border-color: var(--done); }
.item-cb.on    { background: var(--done); border-color: var(--done); }
.item-cb.on::after { content: '✓'; color: #000; font-size: 9px; font-weight: 800; }
.item-body { flex: 1; min-width: 0; }
.item-text { font-size: 13px; line-height: 1.4; word-break: break-word; color: var(--t1); }
.item-sub  { display: flex; align-items: center; gap: 5px; margin-top: 2px; flex-wrap: wrap; }
.item-time { font-size: 10px; color: var(--t3); font-variant-numeric: tabular-nums; font-family: monospace; }
.badge { font-size: 10px; font-weight: 700; padding: 0 5px; text-transform: uppercase; letter-spacing: .3px; cursor: pointer; border: 1px solid; }
.badge.note  { background: var(--note-bg);  color: var(--note);  border-color: var(--note); }
.badge.todo  { background: var(--todo-bg);  color: var(--todo);  border-color: var(--todo); }
.badge.event { background: var(--event-bg); color: var(--event); border-color: var(--event); }

/* ── QUICK ADD ───────────────────────────────────────────────────────────── */
.quick-add { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; color: var(--t3); border-bottom: 1px solid var(--bd-lo); transition: all .1s; }
.quick-add:hover { color: var(--acc); background: var(--acc-bg); }
.qa-icon { font-size: 12px; } .qa-text { font-size: 12px; }

/* ── EMPTY ───────────────────────────────────────────────────────────────── */
.empty    { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 40px 20px; color: var(--t3); }
.empty-ic { font-size: 28px; opacity: .3; } .empty-tx { font-size: 12px; font-family: monospace; }

/* ── LIST VIEW ───────────────────────────────────────────────────────────── */
.list-filters { display: flex; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; border-bottom: 1px solid var(--bd); background: var(--bg1); }
.list-filters::-webkit-scrollbar { display: none; }
.fc { padding: 6px 14px; border: none; border-bottom: 1px solid transparent; white-space: nowrap; background: var(--bg2); font-size: 11px; font-weight: 600; color: var(--t2); cursor: pointer; transition: all .1s; border-right: 1px solid var(--bd-lo); }
.fc:hover { color: var(--t1); background: var(--bg3); }
.fc.on    { color: var(--acc); border-bottom-color: var(--acc); background: var(--bg); font-weight: 700; }
.list-body { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav-h)+12px+var(--safe-b)); }

/* ── BOTTOM NAV — 4 tabs with centre + ──────────────────────────────────── */
.bnav { height: calc(var(--nav-h)+var(--safe-b)); padding-bottom: var(--safe-b); background: var(--bg1); border-top: 1px solid var(--bd); display: flex; flex-shrink: 0; }
@media (min-width: 768px) { .bnav { display: none; } .hdr-tabs { display: flex; } }
@media (max-width: 767px) { .hdr-tabs { display: none; } }
.nb { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; border-top: 1px solid transparent; background: transparent; cursor: pointer; color: var(--t3); font-size: 9px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; transition: all .1s; margin-top: -1px; }
.nb:hover { color: var(--t1); background: var(--bg2); }
.nb.on    { color: var(--acc); border-top-color: var(--acc); background: var(--bg); }
.nb svg   { width: 18px; height: 18px; }
/* Centre add button — distinct, always reachable */
.nb-add {
  background: var(--acc); color: #000; border: none;
  flex: 0 0 52px; height: 36px; margin: auto 4px;
  border-radius: 0; font-size: 20px; font-weight: 700;
  align-self: center; padding-bottom: 0;
  border-top: none !important;
}
.nb-add:hover { filter: brightness(1.12); background: var(--acc); }
.nb-add svg   { width: 20px; height: 20px; stroke-width: 2.5; }

/* ── MODAL ───────────────────────────────────────────────────────────────── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 100; align-items: flex-end; }
.overlay.open { display: flex; animation: fadein .12s; }
@media (min-width: 768px) { .overlay { align-items: center; justify-content: center; } }
@keyframes fadein { from{opacity:0}to{opacity:1} }
.modal { background: var(--bg1); border: 1px solid var(--bd); border-bottom: none; width: 100%; max-height: 92dvh; padding: 12px 16px 24px; overflow-y: auto; animation: slideup .24s cubic-bezier(.4,0,.2,1); touch-action: none; }
@media (min-width: 768px) { .modal { max-width: 440px; border-bottom: 1px solid var(--bd); animation: popin .16s ease; } }
@keyframes slideup { from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1} }
@keyframes popin   { from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1} }
.m-handle-wrap { display: flex; justify-content: center; margin-bottom: 10px; cursor: pointer; }
.m-handle { width: 28px; height: 2px; background: var(--bd); }
@media (min-width: 768px) { .m-handle-wrap { display: none; } }
.m-title { font-size: 12px; font-weight: 700; margin-bottom: 12px; color: var(--acc); text-transform: uppercase; letter-spacing: .6px; }
.m-ta { width: 100%; background: var(--bg); border: 1px solid var(--bd); padding: 9px 11px; font-size: 13px; font-family: inherit; resize: none; outline: none; min-height: 72px; line-height: 1.5; color: var(--t1); transition: border-color .1s; }
.m-ta:focus { border-color: var(--focus); outline: 1px solid var(--focus); }
.m-ta::placeholder { color: var(--t3); }
.type-sel { display: flex; gap: 1px; margin: 10px 0; background: var(--bd-lo); }
.topt { flex: 1; padding: 7px 4px; border: none; background: var(--bg2); cursor: pointer; text-align: center; font-size: 11px; font-weight: 700; transition: all .1s; color: var(--t3); display: flex; flex-direction: column; align-items: center; gap: 3px; text-transform: uppercase; letter-spacing: .3px; }
.topt:hover { background: var(--bg3); color: var(--t1); }
.topt-ic { font-size: 16px; }
.topt.on.note  { background: var(--note-bg);  color: var(--note);  border-bottom: 2px solid var(--note); }
.topt.on.todo  { background: var(--todo-bg);  color: var(--todo);  border-bottom: 2px solid var(--todo); }
.topt.on.event { background: var(--event-bg); color: var(--event); border-bottom: 2px solid var(--event); }
.m-row { display: flex; gap: 6px; margin-bottom: 10px; }
.m-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.m-field label { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .5px; }
.m-field input { background: var(--bg); border: 1px solid var(--bd); padding: 6px 9px; font-size: 12px; outline: none; font-family: inherit; color: var(--t1); transition: border-color .1s; }
.m-field input:focus { border-color: var(--focus); outline: 1px solid var(--focus); }
.m-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 4px; }
.btn-ghost { padding: 6px 12px; border: 1px solid var(--bd); background: transparent; font-size: 12px; font-weight: 600; color: var(--t2); cursor: pointer; transition: all .1s; }
.btn-ghost:hover { border-color: var(--bd-hi); color: var(--t1); }
.btn-save  { padding: 6px 18px; border: none; background: var(--acc); color: #000; font-size: 12px; font-weight: 700; cursor: pointer; transition: filter .1s; }
.btn-save:hover { filter: brightness(1.1); }
.btn-save:disabled { opacity: .4; }

/* ── REMINDER ────────────────────────────────────────────────────────────── */
.rem-section { background: var(--bg2); border: 1px solid var(--bd-lo); overflow: hidden; margin-bottom: 10px; }
.rem-hdr { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; cursor: pointer; user-select: none; }
.rem-hdr-lbl { font-size: 11px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: .4px; display: flex; align-items: center; gap: 6px; }
.rem-toggle { width: 32px; height: 18px; border-radius: 9px; background: var(--bg3); border: 1px solid var(--bd); position: relative; transition: background .15s; flex-shrink: 0; cursor: pointer; }
.rem-toggle.on { background: var(--done); border-color: var(--done); }
.rem-toggle::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: white; top: 1px; left: 1px; transition: left .15s; }
.rem-toggle.on::after { left: 15px; }
.rem-body { padding: 7px 10px 10px; border-top: 1px solid var(--bd-lo); }
.rem-row  { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.rem-row:last-child { margin-bottom: 0; }
.rem-lbl  { font-size: 11px; color: var(--t2); min-width: 44px; }
.rem-sel  { background: var(--bg1); border: 1px solid var(--bd); padding: 3px 7px; font-size: 11px; color: var(--t1); cursor: pointer; outline: none; flex: 1; min-width: 0; }
.rem-sel:focus { border-color: var(--focus); }
.notif-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; padding: 2px 8px; cursor: pointer; border: 1px solid; text-transform: uppercase; letter-spacing: .3px; }
.notif-badge.off { background: transparent; color: var(--red); border-color: var(--red); }
.notif-badge.on  { background: var(--done-bg); color: var(--done); border-color: var(--done); }

/* ── CONTEXT MENU ────────────────────────────────────────────────────────── */
.ctx { display: none; position: fixed; background: var(--bg1); border: 1px solid var(--bd); z-index: 200; overflow: hidden; min-width: 150px; }
.ctx.open { display: block; animation: popin .1s; }
.ci { padding: 7px 12px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--t1); transition: background .08s; }
.ci:hover { background: var(--bg3); color: var(--acc); }
.ci.del { color: var(--red); }
.ci.del:hover { background: rgba(244,71,71,.1); color: var(--red); }
.ci-sep { height: 1px; background: var(--bd-lo); }

/* ── SETTINGS PANEL ──────────────────────────────────────────────────────── */
.set-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 300; }
.set-overlay.open { display: block; animation: fadein .12s; }
.set-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg1); border-top: 1px solid var(--bd); z-index: 301; padding: 8px 0 calc(18px + var(--safe-b)); max-height: 80dvh; overflow-y: auto; transform: translateY(105%); transition: transform .26s cubic-bezier(.4,0,.2,1); }
.set-sheet.open { transform: translateY(0); }
@media (min-width: 768px) { .set-sheet { left: auto; right: 0; top: 0; bottom: 0; width: 260px; max-height: 100dvh; border-top: none; border-left: 1px solid var(--bd); transform: translateX(110%); } .set-sheet.open { transform: translateX(0); } }
.set-drag    { width: 28px; height: 2px; background: var(--bd); margin: 0 auto 12px; }
.set-profile { display: flex; align-items: center; gap: 10px; padding: 0 12px 12px; border-bottom: 1px solid var(--bd-lo); margin-bottom: 4px; }
.set-avatar  { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--acc); background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--acc); overflow: hidden; flex-shrink: 0; }
.set-avatar img { width: 100%; height: 100%; object-fit: cover; }
.set-name    { font-size: 13px; font-weight: 600; }
.set-email   { font-size: 11px; color: var(--t3); font-family: monospace; }
.set-section { padding: 2px 6px; }
.set-item    { display: flex; align-items: center; gap: 9px; padding: 8px 8px; font-size: 13px; color: var(--t1); cursor: pointer; text-decoration: none; transition: all .08s; }
.set-item:hover  { background: var(--bg2); color: var(--acc); }
.set-item-ic  { font-size: 14px; width: 18px; text-align: center; }
.set-item-arr { margin-left: auto; color: var(--t3); }
.set-danger   { color: var(--red); }
.set-danger:hover { background: rgba(244,71,71,.08); color: var(--red); }
.neu-switch   { width: 32px; height: 18px; border-radius: 9px; background: var(--bg3); border: 1px solid var(--bd); position: relative; margin-left: auto; flex-shrink: 0; transition: background .15s; pointer-events: none; }
.neu-switch.on { background: var(--acc); border-color: var(--acc); }
.neu-switch::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: white; top: 1px; left: 1px; transition: left .15s; }
.neu-switch.on::after { left: 15px; }
.set-version { text-align: center; font-size: 10px; color: var(--t3); margin-top: 16px; font-family: monospace; }

/* ── TOAST ───────────────────────────────────────────────────────────────── */
.toast { position: fixed; bottom: calc(var(--nav-h)+var(--safe-b)+12px); left: 50%; transform: translateX(-50%) translateY(8px); background: var(--bg2); border: 1px solid var(--bd); color: var(--t1); padding: 5px 12px; font-size: 12px; font-weight: 500; opacity: 0; transition: all .18s; z-index: 400; white-space: nowrap; pointer-events: none; font-family: monospace; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@media (min-width: 768px) { .toast { bottom: 16px; } }

::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--bd-lo); }

/* ── ATTACHMENTS ─────────────────────────────────────────────────────────── */
.m-attach-bar { display:flex; align-items:center; gap:6px; margin:8px 0 4px; }
.att-btn { width:30px; height:30px; border:1px solid var(--bd); background:var(--bg2); color:var(--t2); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .1s; flex-shrink:0; }
.att-btn:hover { border-color:var(--acc); color:var(--acc); }
.att-btn.recording { color:var(--red); border-color:var(--red); animation:pulse 1s ease-in-out infinite; }
.att-status { font-size:11px; color:var(--red); font-family:monospace; flex:1; }
.m-att-preview { margin:4px 0 8px; }
.att-img-wrap { position:relative; display:inline-flex; }
.att-img { max-height:100px; max-width:100%; border:1px solid var(--bd); cursor:pointer; display:block; }
.att-img:hover { border-color:var(--acc); }
.att-audio-chip { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border:1px solid var(--event); background:var(--event-bg); color:var(--event); font-size:12px; font-family:monospace; }
.att-del { position:absolute; top:-1px; right:-1px; width:18px; height:18px; border:none; background:var(--red); color:#fff; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
.att-inline-del { margin-left:4px; background:transparent; border:none; color:var(--red); cursor:pointer; font-size:12px; padding:0; }
.att-loading { font-size:11px; color:var(--t2); padding:6px 0; font-family:monospace; }
/* Thumbnails & players in item rows */
.item-thumb { width:56px; height:56px; object-fit:cover; border:1px solid var(--bd); cursor:pointer; flex-shrink:0; }
.item-thumb:hover { border-color:var(--acc); }
.item-play { display:inline-flex; align-items:center; gap:4px; padding:2px 7px; border:1px solid var(--event); background:var(--event-bg); color:var(--event); font-size:10px; cursor:pointer; font-family:monospace; transition:filter .1s; margin-top:3px; }
.item-play:hover { filter:brightness(1.2); }
.item-play.loading { opacity:.5; cursor:wait; }
/* Lightbox */
.lightbox { position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:2000; display:flex; align-items:center; justify-content:center; cursor:zoom-out; }
.lightbox img { max-width:96vw; max-height:96vh; object-fit:contain; }

</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-card">
    <div class="auth-logo">📅</div>
    <div class="auth-name">LifeOS</div>
    <div class="auth-sub">Calendar, todos &amp; notes — in your Google Drive</div>
    <button class="gsi-btn" onclick="startAuth()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </button>
  </div>
</div>

<!-- LOADING -->
<div id="loading"><div class="spin"></div><div id="load-msg">Loading…</div></div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <div class="hdr-wordmark">
      <div class="hdr-logo-icon">📅</div>
      <span class="hdr-wordmark-text">LifeOS</span>
    </div>
    <div class="hdr-tabs" id="hdr-tabs"></div>
    <div class="hdr-actions">
      <button class="hdr-new-btn" onclick="openModal()" title="New item (N)">+ New</button>
      <button class="icon-btn" id="sync-btn" onclick="syncNow()" title="Sync">↻</button>
      <button class="avatar-btn" id="hdr-avatar" onclick="openSettings()" title="Settings">⚙</button>
    </div>
  </div>

  <div class="body">
    <!-- CALENDAR VIEW -->
    <div class="view on" id="v-cal">
      <div class="seg-wrap">
        <div class="seg-ctrl">
          <button class="seg on" data-m="month" onclick="setCalMode('month')">Month</button>
          <button class="seg"    data-m="week"  onclick="setCalMode('week')">Week</button>
          <button class="seg"    data-m="day"   onclick="setCalMode('day')">Day</button>
        </div>
      </div>
      <!-- calendar content injected here -->
      <div id="cal-body" style="display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative"></div>
    </div>

    <!-- LIST VIEW -->
    <div class="view" id="v-list">
      <div class="list-filters" id="list-filters"></div>
      <div class="list-body" id="list-body"></div>
    </div>
  </div>

  <!-- BOTTOM NAV — 4 tabs: Cal | List | + | Profile -->
  <div class="bnav">
    <button class="nb on" id="nb-cal" onclick="switchView('cal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Calendar
    </button>
    <button class="nb" id="nb-list" onclick="switchView('list')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <circle cx="3" cy="6" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="3" cy="12" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="3" cy="18" r="1.2" fill="currentColor" stroke="none"/>
      </svg>
      List
    </button>
    <!-- Centre add — always reachable with thumb -->
    <button class="nb nb-add" onclick="openModal()" aria-label="New item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <button class="nb" id="nb-set" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Profile
    </button>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal">
  <div class="modal" id="modal-inner" role="dialog" aria-modal="true">
    <div class="m-handle-wrap"><div class="m-handle"></div></div>
    <div class="m-title" id="m-title">New Item</div>
    <textarea class="m-ta" id="m-content" placeholder="What's on your mind?" rows="4"></textarea>
    <!-- Attachment bar -->
    <div class="m-attach-bar">
      <button class="att-btn" id="att-img-btn"  onclick="pickImage()"       title="Attach photo">📷</button>
      <button class="att-btn" id="att-mic-btn"  onclick="toggleRecording()" title="Record voice">🎤</button>
      <span class="att-status" id="att-status"></span>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════════
// UTILS — pure functions, no side effects
// ══════════════════════════════════════════════════════════════════
const p2      = n  => String(n).padStart(2, '0');
const uid     = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const bool    = x  => x ? 'TRUE' : 'FALSE';
const esc     = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ds      = d  => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const today   = () => new Date();
const addDay  = (d, n) => new Date(d.getFullYear(), d.getMonth(), d.getDate() + n);
const addMon  = (d, n) => new Date(d.getFullYear(), d.getMonth() + n, 1);
const wkStart = d  => addDay(d, -d.getDay());
const parseDs = s  => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const sameDs  = (a, b) => ds(a) === ds(b);

const fmtTime = t => {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  return `${h % 12 || 12}:${p2(m)} ${h >= 12 ? 'PM' : 'AM'}`;
};
const fmtShort = s => {
  if (!s) return '';
  const td = ds(today());
  if (s === td)                           return 'Today';
  if (s === ds(addDay(today(), -1)))      return 'Yesterday';
  if (s === ds(addDay(today(),  1)))      return 'Tomorrow';
  const d = parseDs(s);
  return `${MON[d.getMonth()].slice(0,3)} ${d.getDate()}`;
};

// ══════════════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════════════
const MON   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DABRV = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const SCOPE      = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.metadata.readonly';
const TAB        = 'Items';
const CLIENT_ID  = '348308608113-0mava56gnj2bqn8lqsd80k366643nr6p.apps.googleusercontent.com';

// ══════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════
const S = {
  items:      [],
  view:       'cal',
  calMode:    'month',
  pivot:      today(),
  sel:        today(),
  filter:     'today',
  modalType:  'note',
  editId:     null,
  ctxId:      null,
  token:      null,  tokenExp: 0,
  sheetId:    null,  tabId: 0,
  clientId:   CLIENT_ID,
  syncing:    false,
  _reminders: [],
  _remOn:     false,
  dark:       localStorage.getItem('lo_dark') !== 'false', // default dark
  user:       null,
};

// ══════════════════════════════════════════════════════════════════
// PERSISTENCE
// ══════════════════════════════════════════════════════════════════
const persist  = () => localStorage.setItem('lo_sid', S.sheetId||'');
const hydrate  = () => { S.sheetId = localStorage.getItem('lo_sid')||''; };
const cache    = () => localStorage.setItem('lo_cache', JSON.stringify(S.items));
const restore  = () => { try { S.items = JSON.parse(localStorage.getItem('lo_cache')||'[]'); } catch(_) {} };
const $        = id => document.getElementById(id);

// ══════════════════════════════════════════════════════════════════
// SHEETS API — minimal, composable
// ══════════════════════════════════════════════════════════════════
const BASE = 'https://sheets.googleapis.com/v4/spreadsheets';
const authH = () => ({ Authorization: `Bearer ${S.token}`, 'Content-Type': 'application/json' });
const req   = (m, url, body) => fetch(url, { method: m, headers: authH(), body: body && JSON.stringify(body) })
  .then(r => r.ok ? r.json() : r.text().then(t => { throw new Error(t); }));

const sheetsGet  = p    => req('GET',  `${BASE}${p}`);
const sheetsPost = (p,b) => req('POST', `${BASE}${p}`, b);
const sheetsPut  = (p,b) => req('PUT',  `${BASE}${p}`, b);

const rangeUrl   = r  => `/${S.sheetId}/values/${TAB}!${r}`;
const batchUpd   = rs => sheetsPost(`/${S.sheetId}:batchUpdate`, { requests: rs });

// Columns: id | type | content | date | time | completed | created_at | deleted | end_time | reminders
const toRow   = i => [
  i.id, i.type, i.content, i.date||'', i.time||'', bool(i.completed),
  i.createdAt, bool(i.deleted), i.endTime||'',
  i.reminders   ? JSON.stringify(i.reminders)   : '',
  i.attachment  ? JSON.stringify(i.attachment)  : '',
];
const safeJSON = s => { try { return s ? JSON.parse(s) : null; } catch(_) { return null; } };
const fromRow = (row, idx) => ({
  id: row[0]||'', type: row[1]||'note', content: row[2]||'',
  date: row[3]||'', time: row[4]||'', completed: row[5]==='TRUE',
  createdAt: row[6]||'', deleted: row[7]==='TRUE',
  endTime:    row[8]||'',
  reminders:  safeJSON(row[9]),
  attachment: safeJSON(row[10]),
  _row: idx + 2,
});

const fetchItems = () =>
  sheetsGet(`${rangeUrl('A2:K3000')}`)
    .then(d => { S.items = (d.values||[]).map(fromRow).filter(i => i.id && !i.deleted); });

const appendItem = item =>
  sheetsPost(`${rangeUrl('A:K')}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`, { values: [toRow(item)] });

const updateItem = item =>
  sheetsPut(`${rangeUrl(`A${item._row}:K${item._row}`)}?valueInputOption=RAW`, { values: [toRow(item)] });

// Actually delete the row (not a soft-delete flag)
const deleteItemRow = item =>
  batchUpd([{ deleteDimension: { range: { sheetId: S.tabId, dimension: 'ROWS', startIndex: item._row-1, endIndex: item._row } } }]);

// ══════════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════════

// Called by the "Sign in with Google" button — always shows account picker
const startAuth = () => {
  if (typeof google === 'undefined') return toast('Google script not loaded — check your connection');
  google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: async r => {
      if (r.error) return toast('Sign-in error: ' + r.error);
      S.token = r.access_token;
      S.tokenExp = Date.now() + r.expires_in * 1000 - 60000;
      await boot();
    },
  }).requestAccessToken({ prompt: 'select_account' });
};

// Silent refresh — only called for returning users who already have a token
const silentRefresh = () => new Promise(ok => {
  if (Date.now() < S.tokenExp) return ok(true);
  if (typeof google === 'undefined') return ok(false);
  google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: r => {
      if (!r.error) { S.token = r.access_token; S.tokenExp = Date.now() + r.expires_in * 1000 - 60000; ok(true); }
      else ok(false);
    },
  }).requestAccessToken({ prompt: '' });
});

// Auto-login for RETURNING users only (sheetId stored = prior auth evidence)
// Uses a separate client from startAuth so they never interfere
const autoLogin = () => {
  showLoad('Signing in…');
  google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: async r => {
      if (r.error) { hideLoad(); return; } // silent fail → auth screen stays visible
      S.token = r.access_token;
      S.tokenExp = Date.now() + r.expires_in * 1000 - 60000;
      await boot();
    },
  }).requestAccessToken({ prompt: '' });
};

// Poll until GIS library is ready, then run cb
const whenGIS = (cb, tries = 0) => {
  if (typeof google !== 'undefined' && google.accounts?.oauth2) return cb();
  if (tries > 80) return; // give up after ~8s, auth screen stays visible
  setTimeout(() => whenGIS(cb, tries + 1), 100);
};

// ══════════════════════════════════════════════════════════════════
// SHEET DISCOVERY — find existing sheet before creating a new one
// ══════════════════════════════════════════════════════════════════
const driveSearch = name =>
  fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${name}' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false`)}&fields=files(id,modifiedTime)&orderBy=modifiedTime+desc&pageSize=5`, { headers: authH() })
    .then(r => r.json());

const ensureItemsTab = async () => {
  const meta = await sheetsGet(`/${S.sheetId}?fields=sheets.properties`);
  S.tabId = (meta.sheets.find(s => s.properties.title === TAB) || meta.sheets[0]).properties.sheetId;
  if (!meta.sheets.find(s => s.properties.title === TAB)) {
    await sheetsPost(`/${S.sheetId}:batchUpdate`, { requests: [{ addSheet: { properties: { title: TAB } } }] });
    await sheetsPut(`${rangeUrl('A1:J1')}?valueInputOption=RAW`,
      { values: [['id','type','content','date','time','completed','created_at','deleted','end_time','reminders','attachment']] });
  }
};

const findOrCreateSheet = async () => {
  // The sheet is always called "LifeOS" — that name IS the identity.
  // localStorage is only a speed cache; searching by name always recovers after a wipe.

  // Fast path: if we have a cached ID, verify it still exists
  if (S.sheetId) {
    try { await sheetsGet(`/${S.sheetId}?fields=spreadsheetId`); return; }
    catch(_) { S.sheetId = null; persist(); } // stale — fall through to search
  }

  // Always search by name — works after any cache clear, on any device
  showLoad('Looking for your LifeOS sheet…');
  const found = await driveSearch('LifeOS');
  if (found.files?.length) {
    // Use the most recently modified sheet (driveSearch orders by modifiedTime desc)
    S.sheetId = found.files[0].id; persist();
    await ensureItemsTab();
    return;
  }

  // No "LifeOS" sheet in Drive — create one (first time only)
  showLoad('Creating your LifeOS sheet…');
  const ss = await sheetsPost('', { properties: { title: 'LifeOS' }, sheets: [{ properties: { title: TAB } }] });
  S.sheetId = ss.spreadsheetId; persist();
  await sheetsPut(`${rangeUrl('A1:J1')}?valueInputOption=RAW`,
    { values: [['id','type','content','date','time','completed','created_at','deleted','end_time','reminders']] });
  await ensureItemsTab();
};

// ══════════════════════════════════════════════════════════════════
// NOTIFICATIONS — local scheduling via Notification API
// ══════════════════════════════════════════════════════════════════
// Notify: SW showNotification when installed (works backgrounded), else direct Notification
const notify = (body, tag) => {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const opts = { body, icon: 'icon.svg', tag };
  // SW controller means the PWA is installed — prefer reg.showNotification
  if (navigator.serviceWorker?.controller) {
    navigator.serviceWorker.ready
      .then(r => r.showNotification('LifeOS', { ...opts, requireInteraction: true }))
      .catch(() => new Notification('LifeOS', opts)); // immediate fallback
  } else {
    // Plain browser tab — direct Notification works fine
    try { new Notification('LifeOS', opts); } catch(e) { console.warn('Notification failed:', e); }
  }
};

// Test button: fires a notification immediately so user can verify permission works
const testNotify = () => {
  if (Notification.permission !== 'granted') { requestNotifPerms(); return; }
  notify('LifeOS reminders are working! 🎉', 'test-' + Date.now());
};

const requestNotifPerms = async () => {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') await Notification.requestPermission();
  updateNotifBadge();
};

const updateNotifBadge = () => {
  const btn = $('notif-status'); if (!btn) return;
  const granted = 'Notification' in window && Notification.permission === 'granted';
  btn.className = `notif-badge ${granted ? 'on' : 'off'}`;
  btn.textContent = granted ? '🔔 Reminders on' : '🔕 Allow notifications';
};

// Schedule all reminders from item.reminders config
// Config: { start: minutesBefore, every: intervalMin, times: count }
const scheduleReminders = () => {
  S._reminders.forEach(clearTimeout); S._reminders = [];
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = Date.now(), count = { n: 0 };
  S.items
    .filter(i => i.time && i.date && !i.completed && i.reminders && (i.type === 'event' || i.type === 'todo'))
    .forEach(i => {
      const [h, m] = i.time.split(':').map(Number);
      const eventMs = (() => { const d = parseDs(i.date); d.setHours(h, m, 0, 0); return d.getTime(); })();
      const { start = 30, every = 0, times = 1 } = i.reminders;
      const fireCount = every > 0 ? times : 1;
      Array.from({ length: fireCount }, (_, k) => {
        const minBefore = start - k * every;
        const delay = eventMs - minBefore * 60000 - now;
        if (delay > 0 && delay < 48 * 3600000) {
          const label = minBefore <= 0 ? 'starting now' : minBefore === 1 ? 'in 1 min' : `in ${minBefore} min`;
          S._reminders.push(setTimeout(() => notify(`${i.content} — ${label}`, `${i.id}-${k}`), delay));
          count.n++;
        }
      });
    });
  if (count.n > 0) toast(`⏰ ${count.n} reminder${count.n > 1 ? 's' : ''} scheduled`);
};

// ══════════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════════
const boot = async () => {
  showLoad('Connecting…');
  try {
    await findOrCreateSheet();
    const meta = await sheetsGet(`/${S.sheetId}?fields=sheets.properties`);
    S.tabId = (meta.sheets.find(s => s.properties.title === TAB) || meta.sheets[0]).properties.sheetId;
    showLoad('Loading items…');
    await fetchItems(); cache();
    hideLoad();
    $('auth').style.display = 'none';
    $('app').classList.add('on');
    render(); openDayPanel();
    fetchUserInfo(); // non-blocking
    await requestNotifPerms();
    scheduleReminders();
  } catch(e) { hideLoad(); toast('Error: ' + e.message); console.error(e); }
};

// ══════════════════════════════════════════════════════════════════
// SYNC
// ══════════════════════════════════════════════════════════════════
const syncNow = async () => {
  if (S.syncing || !S.token) return;
  S.syncing = true; $('sync-btn').classList.add('go');
  try { await silentRefresh(); await fetchItems(); cache(); render(); scheduleReminders(); toast('Synced ✓'); }
  catch(e) { toast('Sync failed'); }
  finally { S.syncing = false; $('sync-btn').classList.remove('go'); }
};

// ══════════════════════════════════════════════════════════════════
// CRUD — optimistic updates, rollback on error
// ══════════════════════════════════════════════════════════════════
// Ensure a valid token before any write — the fast-path (cached data) skips auth
const ensureToken = async () => {
  if (S.token && Date.now() < S.tokenExp) return true;
  const ok = await silentRefresh();
  if (!ok) {
    toast('Session expired — tap ↻ or sign in again');
    // Show auth screen if we truly have no token
    if (!S.token) { $('app').classList.remove('on'); $('auth').style.display = ''; }
    return false;
  }
  return true;
};

const addItem = async ({ content, type, date='', time='', endTime='', reminders=null, attachment=null }) => {
  if (!await ensureToken()) return;
  const item = { id: uid(), type, content, date, time, endTime, reminders, attachment, completed: false, createdAt: new Date().toISOString(), deleted: false, _row: null };
  S.items.unshift(item); cache(); render();
  try { await appendItem(item); await fetchItems(); cache(); render(); scheduleReminders(); toast('Saved'); }
  catch(e) { S.items = S.items.filter(i => i.id !== item.id); cache(); render(); toast('Save failed: ' + e.message); }
};

const editItem = async (id, patch) => {
  if (!await ensureToken()) return;
  const item = S.items.find(i => i.id === id); if (!item) return;
  const prev = { ...item }; Object.assign(item, patch); cache(); render();
  try { await updateItem(item); scheduleReminders(); toast('Updated'); }
  catch(e) { Object.assign(item, prev); cache(); render(); toast('Update failed: ' + e.message); }
};

const toggleDone = async id => {
  if (!await ensureToken()) return;
  const item = S.items.find(i => i.id === id); if (!item || item.type !== 'todo') return;
  item.completed = !item.completed; cache(); render();
  try { await updateItem(item); }
  catch(e) { item.completed = !item.completed; cache(); render(); toast('Failed to update'); }
};

const changeType = async (id, type) => {
  if (!await ensureToken()) return;
  const item = S.items.find(i => i.id === id); if (!item) return;
  const prev = item.type; item.type = type; if (type !== 'todo') item.completed = false;
  cache(); render();
  try { await updateItem(item); toast('Changed to ' + type); }
  catch(e) { item.type = prev; cache(); render(); toast('Update failed'); }
};

const deleteItem = async id => {
  if (!await ensureToken()) return;
  const item = S.items.find(i => i.id === id); if (!item) return;
  S.items = S.items.filter(i => i.id !== id); cache(); render();
  try { await deleteItemRow(item); toast('Deleted'); }
  catch(e) { toast('Delete failed — sync to recover'); }
};

// ══════════════════════════════════════════════════════════════════
// DATA SELECTORS — pure
// ══════════════════════════════════════════════════════════════════
const onDate = d  => S.items.filter(i => i.date === ds(d));
const order  = t  => ({ event:0, todo:1, note:2 })[t] ?? 3;
const byTime = is => [...is].sort((a,b) =>
  a.time && b.time ? a.time.localeCompare(b.time) :
  a.time ? -1 : b.time ? 1 : order(a.type) - order(b.type)
);
const applyFilter = (items, f) =>
  f === 'all'   ? items :
  f === 'today' ? items.filter(i => i.date === ds(today())) :
  items.filter(i => i.type === f);

// ── DAY VIEW LAYOUT ────────────────────────────────────────────────────────
const HOUR_H  = 64;                                        // px per hour
const DUR_MIN = 45;                                        // assumed event duration
const toMin   = t => { const [h,m] = (t||'0:0').split(':').map(Number); return h*60+m; };
const timeToY = t => toMin(t) / 60 * HOUR_H;
const hourLabel = h => h === 0 ? '' : h < 12 ? `${h} AM` : h === 12 ? '12 PM' : `${h-12} PM`;

// Greedy column layout for overlapping events
const layoutBlocks = timed => {
  if (!timed.length) return [];
  const items = [...timed].sort((a,b) => toMin(a.time) - toMin(b.time));
  const colEnds = [];
  const placed  = items.map(item => {
    const start = toMin(item.time), end = start + DUR_MIN;
    let col = colEnds.findIndex(e => e <= start);
    if (col === -1) col = colEnds.length;
    colEnds[col] = end;
    return { item, col };
  });
  return placed.map(p => {
    const start = toMin(p.item.time), end = start + DUR_MIN;
    const concurrent = placed.filter(q => { const qs=toMin(q.item.time); return qs<end && qs+DUR_MIN>start; });
    return { ...p, numCols: Math.max(...concurrent.map(c=>c.col)) + 1 };
  });
};

// ══════════════════════════════════════════════════════════════════
// HTML TEMPLATES — pure functions returning strings
// ══════════════════════════════════════════════════════════════════
const itemHTML = item => {
  const done = item.completed;
  const left = item.type === 'todo'
    ? `<div class="item-cb${done?' on':''}" data-toggle="${item.id}"></div>`
    : `<div class="item-icon">${item.type==='event'?'📅':'📝'}</div>`;
  const att = item.attachment;
  return `
  <div class="item-row${done?' done':''}" data-id="${item.id}">
    ${att?.type==='image' ? `<img class="item-thumb" src="${att.thumb}" alt="" onclick="showLightbox('${att.id}')">` : left}
    <div class="item-body">
      <div class="item-text">${esc(item.content)}</div>
      <div class="item-sub">
        ${item.time ? `<span class="item-time">${fmtTime(item.time)}</span>` : ''}
        <span class="badge ${item.type}" data-badge="${item.id}">${item.type}</span>
      </div>
      ${att?.type==='audio' ? `<button class="item-play" data-audio="${att.id}" data-dur="${att.dur||0}" onclick="playAudio(this)">▶ ${fmtDur(att.dur||0)}</button>` : ''}
    </div>
  </div>`;
};

// Group items by date into inset sections (for list view)
const groupedHTML = items => {
  const map = {};
  items.forEach(i => { (map[i.date||''] = map[i.date||''] || []).push(i); });
  const keys = Object.keys(map).sort((a,b) => {
    if (!a && !b) return 0; if (!a) return 1; if (!b) return -1; return a.localeCompare(b);
  });
  return keys.map(k => {
    const label = k ? fmtShort(k) : 'No date';
    return `<div class="item-group-hdr">${label}</div>
    <div class="items-inset">${byTime(map[k]).map(itemHTML).join('')}</div>`;
  }).join('') || '<div class="empty"><div class="empty-ic">📭</div><div class="empty-tx">Nothing here yet</div></div>';
};

// Month grid
const monthHTML = () => {
  const y = S.pivot.getFullYear(), m = S.pivot.getMonth();
  const first = new Date(y,m,1).getDay(), total = new Date(y,m+1,0).getDate(), prev = new Date(y,m,0).getDate();
  const tds = ds(today()), sel = ds(S.sel);

  const cells = Array.from({ length: 42 }, (_, i) => {
    let day, mo, yr, other;
    if      (i < first)       { day=prev-first+i+1; mo=m-1; yr=y; other=true; if(mo<0){mo=11;yr--;} }
    else if (i-first < total) { day=i-first+1; mo=m; yr=y; other=false; }
    else                      { day=i-first-total+1; mo=m+1; yr=y; other=true; if(mo>11){mo=0;yr++;} }
    const d = new Date(yr,mo,day), dstr = ds(d);
    const its = onDate(d);
    const dots  = its.slice(0,3).map(i => `<span class="dot ${i.completed?'done':i.type}"></span>`).join('');
    const chips = its.slice(0,3).map(i => `<div class="day-chip ${i.completed?'done':i.type}">${esc(i.content)}</div>`).join('') +
                  (its.length > 3 ? `<div class="day-chip more">+${its.length-3}</div>` : '');
    return `<div class="day-cell${other?' other':''}${dstr===tds?' today':''}${dstr===sel?' sel':''}" data-day="${dstr}">
      <div class="day-n">${day}</div>
      ${dots ? `<div class="day-dots">${dots}</div>` : ''}
      ${chips}
    </div>`;
  });

  return `
  <div class="cal-left">
    <div class="cal-nav">
      <div class="cal-nav-side">
        <button class="nav-arrow" onclick="nav(-1)">‹</button>
      </div>
      <span class="cal-nav-lbl">${MON[m]} ${y}</span>
      <div class="cal-nav-side">
        <button class="today-pill" onclick="goToday()">Today</button>
        <button class="nav-arrow" onclick="nav(1)">›</button>
      </div>
    </div>
    <div class="weekday-row">${DABRV.map(d=>`<div class="wday-lbl">${d}</div>`).join('')}</div>
    <div class="month-grid" id="month-grid">${cells.join('')}</div>
  </div>
  <div class="day-panel" id="day-panel">
    <div class="dp-handle-wrap"><div class="dp-handle"></div></div>
    <div class="dp-hdr">
      <span class="dp-date" id="dp-date"></span>
      <button class="dp-close" onclick="closeDayPanel()">✕</button>
    </div>
    <div class="dp-items" id="dp-items"></div>
  </div>`;
};

// Week view — Google Calendar-style time grid for all 7 days
const weekHTML = () => {
  const start = wkStart(S.pivot);
  const days  = Array.from({ length: 7 }, (_, i) => addDay(start, i));
  const tds   = ds(today());
  const wkEnd = days[6];
  const rangeLabel = start.getMonth() === wkEnd.getMonth()
    ? `${MON[start.getMonth()]} ${start.getDate()}–${wkEnd.getDate()}`
    : `${MON[start.getMonth()].slice(0,3)} ${start.getDate()} – ${MON[wkEnd.getMonth()].slice(0,3)} ${wkEnd.getDate()}`;

  const hdrHTML = days.map(d => {
    const dstr = ds(d);
    return `<div class="wk-col-hdr${dstr===tds?' today':''}" data-day="${dstr}">
      <div class="wk-hdr-name">${DABRV[d.getDay()]}</div>
      <div class="wk-hdr-num">${d.getDate()}</div>
    </div>`;
  }).join('');

  const alldayHTML = days.map(d => {
    const chips = onDate(d).filter(i => !i.time).map(i =>
      `<div class="wk-allday-chip ${i.type}${i.completed?' done':''}" data-id="${i.id}">${esc(i.content)}</div>`
    ).join('');
    return `<div class="wk-allday-col">${chips}</div>`;
  }).join('');

  const timeLabels = Array.from({ length: 24 }, (_, h) =>
    `<div class="wk-time-lbl" style="top:${h*HOUR_H}px">${hourLabel(h)}</div>`
  ).join('');

  const hlines = Array.from({ length: 24 }, (_, h) => [
    `<div class="wk-hline" style="top:${h*HOUR_H}px"></div>`,
    h > 0 ? `<div class="wk-half" style="top:${h*HOUR_H - 32}px"></div>` : '',
  ].join('')).join('');

  const colsHTML = days.map(d => {
    const dstr  = ds(d);
    const timed = byTime(onDate(d).filter(i => i.time));
    const blocks = layoutBlocks(timed).map(({ item, col, numCols }) => {
      const top    = timeToY(item.time);
      const durMin = item.endTime ? toMin(item.endTime) - toMin(item.time) : DUR_MIN;
      const height = Math.max(durMin / 60 * HOUR_H, 22);
      const pct    = 100 / numCols;
      const done   = item.completed;
      const cb     = item.type === 'todo'
        ? `<span class="tb-cb${done?' done':''}" data-toggle="${item.id}"></span>` : '';
      return `<div class="timed-block ${item.type}${done?' done':''}" data-id="${item.id}"
                   style="top:${top}px;height:${height}px;left:${col*pct}%;width:calc(${pct}% - 2px)">
        <div class="tb-row">${cb}<span class="tb-title">${esc(item.content)}</span></div>
        ${height > 34 ? `<div class="tb-time">${fmtTime(item.time)}</div>` : ''}
      </div>`;
    }).join('');
    const hrs = Array.from({ length: 24 }, (_, h) =>
      `<div class="hour-row" data-hour="${h}" data-day="${dstr}" style="top:${h*HOUR_H}px"></div>`
    ).join('');
    return `<div class="wk-col"><div class="timed-layer">${blocks}</div>${hrs}</div>`;
  }).join('');

  const nowDayIdx = days.findIndex(d => sameDs(d, today()));
  const nowY      = (today().getHours() + today().getMinutes() / 60) * HOUR_H;
  const nowHTML   = nowDayIdx >= 0
    ? `<div class="week-now-line" id="week-now-line" style="top:${nowY}px"><div class="week-now-dot"></div></div>` : '';

  return `
  <div class="cal-nav" style="flex-shrink:0">
    <button class="nav-arrow" onclick="nav(-1)">‹</button>
    <span class="cal-nav-lbl">${rangeLabel}</span>
    <div class="cal-nav-side">
      <button class="today-pill" onclick="goToday()">Today</button>
      <button class="nav-arrow" onclick="nav(1)">›</button>
    </div>
  </div>
  <div class="week-view">
    <div class="week-hdr"><div class="week-gutter"></div>${hdrHTML}</div>
    <div class="week-allday"><div class="week-allday-gutter">all day</div>${alldayHTML}</div>
    <div class="week-body" id="week-body">
      <div class="week-times">${timeLabels}</div>
      <div class="week-grid">${hlines}${nowHTML}${colsHTML}</div>
    </div>
  </div>`;
};

// Day view — Google Calendar-style time grid
const dayHTML = () => {
  const its     = byTime(onDate(S.sel));
  const anytime = its.filter(i => !i.time);
  const timed   = its.filter(i => i.time);
  const label   = sameDs(S.sel, today()) ? 'Today' : `${DAY[S.sel.getDay()]}, ${MON[S.sel.getMonth()]} ${S.sel.getDate()}`;

  // All-day strip
  const alldayHTML = anytime.map(i => {
    const cb = i.type === 'todo'
      ? `<span class="allday-cb${i.completed?' on':''}" data-toggle="${i.id}"></span>`
      : '';
    return `<span class="allday-chip ${i.type}${i.completed?' done':''}" data-id="${i.id}">
      ${cb}<span class="allday-text">${esc(i.content)}</span>
    </span>`;
  }).join('');

  // Hour rows (background grid + click targets)
  const hourRowsHTML = Array.from({ length: 24 }, (_, h) =>
    `<div class="hour-row" data-hour="${h}" style="top:${h*HOUR_H}px">
      <div class="hour-lbl">${hourLabel(h)}</div>
      <div class="hour-line"></div>
      <div class="half-line"></div>
    </div>`
  ).join('');

  // Timed event blocks with overlap layout
  const blocksHTML = layoutBlocks(timed).map(({ item, col, numCols }) => {
    const top    = timeToY(item.time);
    const durMin = item.endTime ? toMin(item.endTime) - toMin(item.time) : DUR_MIN;
    const height = Math.max(durMin / 60 * HOUR_H, 28);
    const pct    = 100 / numCols;
    const left   = `${col * pct}%`;
    const width  = `calc(${pct}% - 3px)`;
    const done   = item.completed;
    const cb     = item.type === 'todo'
      ? `<span class="tb-cb${done?' done':''}" data-toggle="${item.id}"></span>`
      : '';
    const durLbl = item.endTime
      ? `<div class="tb-dur">${fmtTime(item.time)} – ${fmtTime(item.endTime)}</div>`
      : `<div class="tb-time">${fmtTime(item.time)}</div>`;
    const remIcon = item.reminders ? ' ⏰' : '';
    return `<div class="timed-block ${item.type}${done?' done':''}"
               data-id="${item.id}"
               style="top:${top}px;height:${height}px;left:${left};width:${width}">
      <div class="tb-row">${cb}<span class="tb-title">${esc(item.content)}${remIcon}</span></div>
      ${height > 36 ? durLbl : ''}
    </div>`;
  }).join('');

  // Current-time indicator (only on today)
  const nowY    = (today().getHours() + today().getMinutes()/60) * HOUR_H;
  const nowHTML = sameDs(S.sel, today())
    ? `<div class="now-line" id="now-line" style="top:${nowY}px"><div class="now-dot"></div></div>`
    : '';

  return `
  <div class="cal-nav">
    <button class="nav-arrow" onclick="nav(-1)">‹</button>
    <span class="cal-nav-lbl">${label}</span>
    <div class="cal-nav-side">
      <button class="today-pill" onclick="goToday()">Today</button>
      <button class="nav-arrow" onclick="nav(1)">›</button>
    </div>
  </div>
  <div class="day-view-wrap">
    <div class="allday-bar">
      <div class="allday-lbl">All day</div>
      <div class="allday-chips" id="allday-chips">${alldayHTML}</div>
    </div>
    <div class="time-grid" id="time-grid">
      <div class="time-inner">
        ${hourRowsHTML}
        <div class="timed-layer" id="timed-layer">${blocksHTML}</div>
        ${nowHTML}
      </div>
    </div>
  </div>`;
};

// List view
const listHTML = () => {
  const tabs = ['today','all','note','todo','event'].map(f =>
    `<button class="fc${S.filter===f?' on':''}" onclick="setFilter('${f}')">${{today:'Today',all:'All',note:'Notes',todo:'Todos',event:'Events'}[f]}</button>`
  ).join('');

  let items = applyFilter(S.items, S.filter);
  items = S.filter === 'today' ? byTime(items) : [...items].sort((a,b) => (a.date||'').localeCompare(b.date||'') || (a.time||'').localeCompare(b.time||''));

  const body = S.filter === 'today'
    ? `<div class="quick-add" style="margin-top:8px" onclick="openModal()"><span class="qa-icon">+</span><span class="qa-text">Add for today…</span></div>
       ${items.length ? `<div class="items-inset" style="margin:8px 16px">${items.map(itemHTML).join('')}</div>` : '<div class="empty"><div class="empty-ic">✨</div><div class="empty-tx">Nothing for today</div></div>'}`
    : groupedHTML(items);

  $('list-filters').innerHTML = tabs;
  $('list-body').innerHTML    = body;
};

// ══════════════════════════════════════════════════════════════════
// RENDER DISPATCH
// ══════════════════════════════════════════════════════════════════
const renderCal = () => {
  const html = { month: monthHTML, week: weekHTML, day: dayHTML }[S.calMode]();
  $('cal-body').innerHTML = html;
  if (S.calMode === 'month') { initDayPanel(); initSwipe($('day-panel'), closeDayPanel); refreshDayPanel(); }
  if (S.calMode === 'day' || S.calMode === 'week') {
    requestAnimationFrame(() => {
      const el = $('time-grid') || $('week-body'); if (!el) return;
      const h  = sameDs(S.sel, today()) ? today().getHours() : 8;
      el.scrollTop = Math.max(0, h * HOUR_H - el.clientHeight / 3);
    });
  }
};

const renderList = () => listHTML();

const render = () => {
  if (S.view === 'cal') renderCal(); else renderList();
};

// ══════════════════════════════════════════════════════════════════
// DAY PANEL (month view)
// ══════════════════════════════════════════════════════════════════
const dayPanelLabel = d =>
  sameDs(d, today()) ? 'Today' : `${DAY[d.getDay()]}, ${MON[d.getMonth()].slice(0,3)} ${d.getDate()}`;

const initDayPanel = () => {
  // open by default on desktop, closed on mobile
  if (window.innerWidth >= 768) $('day-panel').classList.add('open');
};

const openDayPanel = () => {
  const dp = $('day-panel'); if (!dp) return;
  dp.classList.add('open');
  refreshDayPanel();
};

const closeDayPanel = () => {
  const dp = $('day-panel'); if (!dp) return;
  dp.style.transition = '';
  dp.classList.remove('open');
};

const refreshDayPanel = () => {
  const dp = $('day-panel'); if (!dp) return;
  const dEl = $('dp-date'); if (dEl) dEl.textContent = dayPanelLabel(S.sel);
  const di  = $('dp-items'); if (!di) return;
  const its = byTime(onDate(S.sel));
  di.innerHTML = `
    <div class="quick-add" style="margin:8px 16px 0" onclick="openModal()">
      <span class="qa-icon">+</span>
      <span class="qa-text">Add for ${sameDs(S.sel,today())?'today':fmtShort(ds(S.sel))}…</span>
    </div>
    ${its.length
      ? `<div class="items-inset" style="margin:8px 16px 0">${its.map(itemHTML).join('')}</div>`
      : '<div class="empty"><div class="empty-ic">✨</div><div class="empty-tx">Nothing yet</div></div>'}`;
};
